<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Travel Route Explorer</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylinedecorator.css" />
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-color: #121212; --panel-bg: #1e1e1e; --text-main: #f3f4f6;
            --text-muted: #9ca3af; --accent: #8b5cf6; --accent-hover: #7c3aed;
            --success: #10b981; --danger: #ef4444; --border: #333;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-color); color: var(--text-main);
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; touch-action: manipulation;
        }
        header {
            background: #000; padding: 10px; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        .header-row {
            display: flex; align-items: center; gap: 8px;
            overflow-x: auto; white-space: nowrap;
            -webkit-overflow-scrolling: touch; padding-bottom: 4px;
        }
        .header-row::-webkit-scrollbar { display: none; }
        #searchBar {
            flex: 1; min-width: 150px; padding: 8px 16px;
            border-radius: 20px; border: 1px solid var(--border);
            background: #2a2a2a; color: white; outline: none;
        }
        .chip {
            background: #2a2a2a; border: 1px solid var(--border);
            color: var(--text-main); padding: 8px 14px; border-radius: 20px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: all 0.2s; display: inline-flex; align-items: center;
        }
        .chip.active { background: var(--accent); border-color: var(--accent); color: white; }
        
        .main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #map { flex: 1; z-index: 1; }
        /* Filtro scuro per la mappa per adattarsi al dark mode */
        .leaflet-layer, .leaflet-control-zoom-in, .leaflet-control-zoom-out, .leaflet-control-attribution {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        .control-panel {
            background: var(--panel-bg); border-radius: 20px 20px 0 0;
            display: flex; flex-direction: column; max-height: 45vh;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5); z-index: 10;
        }
        .panel-header { padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .panel-header h2 { font-size: 18px; margin-bottom: 4px; color: var(--accent); }
        .steps-container { flex: 1; overflow-y: auto; padding: 10px; }
        .step-row {
            display: flex; align-items: center; gap: 12px;
            padding: 10px; border-radius: 12px; margin-bottom: 6px;
            background: #2a2a2a; opacity: 0.5; transition: 0.3s;
        }
        .step-row.active { opacity: 1; border-left: 4px solid var(--accent); background: #333; }
        .step-number {
            width: 26px; height: 26px; background: #444; color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold;
        }
        .step-row.active .step-number { background: var(--accent); }
        .hidden-mode .step-name { background: #444; color: transparent; border-radius: 6px; }
        
        .panel-footer { padding: 12px; border-top: 1px solid var(--border); }
        .btn-row { display: flex; gap: 8px; }
        .btn {
            flex: 1; padding: 12px; border-radius: 12px; border: none;
            font-weight: bold; cursor: pointer; color: white;
        }
        .btn-secondary { background: #444; }
        .btn-primary { background: var(--accent); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        @media (min-width: 768px) {
            .main-container { flex-direction: row; }
            .control-panel {
                width: 400px; max-height: none;
                border-radius: 0; border-left: 1px solid var(--border);
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-row">
            <input type="text" id="searchBar" placeholder="🔍 Cerca itinerario...">
            <span class="chip active" id="modeEsplora" onclick="setMode('esplora')">Esplora</span>
            <span class="chip" id="modeGuida" onclick="setMode('guida')">Guida</span>
            <span class="chip" id="modeRicorda" onclick="setMode('ricorda')">Ricorda</span>
        </div>
    </header>

    <div class="main-container">
        <div id="map"></div>
        <div class="control-panel">
            <div class="panel-header">
                <h2 id="currentRouteTitle">Seleziona Itinerario</h2>
                <p id="routeProgress" style="color: var(--text-muted); font-size: 13px;">Nessun percorso attivo</p>
            </div>
            <div class="steps-container" id="stepsList"></div>
            <div class="panel-footer" id="normalFooter">
                <div class="btn-row">
                    <button class="btn btn-secondary" id="btnPrev" onclick="prevStep()" disabled>◀ Indietro</button>
                    <button class="btn btn-primary" id="btnNext" onclick="nextStep()" disabled>Avanti ▶</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylinedecorator.js"></script>
    <script>
        // Dati di default focalizzati su viaggi e navigazione turistica
        const DEFAULT = [
            {
                title: "NEW YORK ROAD TRIP",
                steps: ["JFK AIRPORT", "TIMES SQUARE", "CENTRAL PARK", "BROOKLYN BRIDGE", "STATUE OF LIBERTY"]
            },
            {
                title: "LONDON NIGHT & DAY",
                steps: ["CAMDEN TOWN", "SOHO", "COVENT GARDEN", "TOWER BRIDGE", "MINISTRY OF SOUND"]
            }
        ];

        let routes = JSON.parse(localStorage.getItem('travelRoutes')) || DEFAULT;
        let coords = JSON.parse(localStorage.getItem('travelCoords')) || {};
        let map, currentRoute = null, currentStep = 0, marker = null;
        let doneLine = null, doneDecorator = null, nextLine = null;
        let mode = 'esplora';

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([40.7128, -74.0060], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            if (routes.length) selectRoute(routes[0]);
        }

        function selectRoute(route) {
            currentRoute = route; currentStep = 0;
            if (marker) map.removeLayer(marker);
            document.getElementById('currentRouteTitle').textContent = route.title;
            renderSteps(); updateUI(); goToStep();
        }

        function renderSteps() {
            const c = document.getElementById('stepsList'); c.innerHTML = '';
            currentRoute.steps.forEach((s, i) => {
                const d = document.createElement('div');
                d.className = `step-row ${i===currentStep?'active':''} ${mode!=='esplora'?'hidden-mode':''}`;
                d.innerHTML = `<div class="step-number">${i+1}</div><div class="step-name">${s}</div>`;
                c.appendChild(d);
            });
        }

        function setMode(m) {
            mode = m;
            ['modeEsplora','modeGuida','modeRicorda'].forEach(id => document.getElementById(id).className = 'chip');
            document.getElementById('mode'+m.charAt(0).toUpperCase()+m.slice(1)).classList.add('active');
            renderSteps();
        }

        async function goToStep() {
            const step = currentRoute.steps[currentStep];
            const key = `${currentRoute.title}_${currentStep}`;
            
            if (coords[key]) {
                placeMarker(coords[key].lat, coords[key].lon, step, key);
            } else {
                // Semplice fetch per geocoding
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(step)}`);
                    const data = await res.json();
                    if (data.length) placeMarker(parseFloat(data[0].lat), parseFloat(data[0].lon), step, key);
                } catch (e) { console.error("Errore Geocoding", e); }
            }
        }

        function placeMarker(lat, lon, name, key) {
            map.flyTo([lat, lon], 14, { duration: 0.5 });
            if (!marker) marker = L.marker([lat, lon], { draggable: true }).addTo(map);
            else marker.setLatLng([lat, lon]);
            
            marker.bindPopup(`<b>${name}</b>`).openPopup();
            coords[key] = { lat, lon };
            localStorage.setItem('travelCoords', JSON.stringify(coords));
            updateLines();
        }

        function updateLines() {
            if (doneLine) map.removeLayer(doneLine);
            const done = [];
            for (let i = 0; i <= currentStep; i++) {
                const k = `${currentRoute.title}_${i}`;
                if (coords[k]) done.push([coords[k].lat, coords[k].lon]);
            }
            if (done.length > 1) {
                doneLine = L.polyline(done, { color: '#8b5cf6', weight: 4 }).addTo(map);
            }
        }

        function nextStep() {
            if (currentStep < currentRoute.steps.length-1) { currentStep++; renderSteps(); updateUI(); goToStep(); }
        }
        function prevStep() {
            if (currentStep > 0) { currentStep--; renderSteps(); updateUI(); goToStep(); }
        }
        function updateUI() {
            document.getElementById('routeProgress').textContent = `Tappa ${currentStep+1} di ${currentRoute.steps.length}`;
            document.getElementById('btnPrev').disabled = currentStep === 0;
            document.getElementById('btnNext').disabled = currentStep === currentRoute.steps.length-1;
        }

        window.onload = initMap;
    </script>
</body>
</html>
