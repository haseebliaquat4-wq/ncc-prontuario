<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>NCC Pilot — Mappa Percorsi</title>
  <meta name="theme-color" content="#f8f6f0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Ccircle cx='18' cy='18' r='16' fill='%23f0b90b'/%3E%3Cpath d='M18 6 L24 24 L18 20 L12 24 Z' fill='%230b1020'/%3E%3C/svg%3E">
  <meta name="referrer" content="no-referrer-when-downgrade">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --bg-deep: #f0ede6;
      --bg-card: #ffffff;
      --bg-input: #f5f2ec;
      --text-primary: #1a1a2e;
      --text-secondary: #6b7a99;
      --accent: #e8a800;
      --accent-glow: #f0b90b;
      --danger: #e53e3e;
      --success: #2ecc71;
      --border: rgba(0,0,0,0.1);
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 20px 35px rgba(0,0,0,0.12);
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }

    /* FIX: html e body devono avere height:100% */
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* FIX: .app occupa esattamente la viewport con position:fixed */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      width: 100vw;
      position: fixed;
      top: 0; left: 0;
      overflow: hidden;
    }

    /* Topbar */
    .topbar {
      display:flex; align-items:center; gap:10px; padding:8px 16px;
      background: var(--bg-card); border-bottom:1px solid var(--border);
      z-index:1000; flex-shrink:0; flex-wrap:wrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .brand { display:flex; align-items:center; gap:8px; font-weight:700; font-size:1.3rem; letter-spacing:-0.3px; color:var(--accent); white-space:nowrap; }
    .brand-icon { font-size:1.6rem; }
    .search-wrap { flex:1; min-width:160px; position:relative; }
    .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:1rem; opacity:0.5; pointer-events:none; }
    #searchBar {
      width:100%; padding:10px 14px 10px 36px; border-radius:30px;
      border:1px solid var(--border); background:var(--bg-input);
      color:var(--text-primary); font-size:0.9rem; transition:var(--transition); outline:none;
    }
    #searchBar:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(240,185,11,0.2); }
    #searchBar::placeholder { color: var(--text-secondary); }
    .suggestions {
      position:absolute; top:110%; left:0; right:0; background:var(--bg-card);
      border-radius:var(--radius-sm); box-shadow:var(--shadow); list-style:none;
      max-height:200px; overflow-y:auto; display:none; z-index:2000; border:1px solid var(--border);
    }
    .suggestions li { padding:10px 15px; cursor:pointer; transition:background 0.15s; color:var(--text-primary); }
    .suggestions li:hover { background:rgba(240,185,11,0.12); }
    .mode-switch { display:flex; background:var(--bg-input); border-radius:30px; padding:3px; gap:3px; }
    .mode-btn {
      padding:6px 14px; border-radius:30px; border:none; background:transparent;
      color:var(--text-secondary); font-weight:600; font-size:0.8rem; cursor:pointer;
      transition:var(--transition); white-space:nowrap;
    }
    .mode-btn.active { background:var(--accent); color:#fff; box-shadow:0 4px 10px rgba(240,185,11,0.35); }
    .actions { position:relative; }
    .icon-btn {
      background:var(--bg-input); border:1px solid var(--border); color:var(--text-primary); font-size:1.4rem;
      width:40px; height:40px; border-radius:50%; display:flex; align-items:center;
      justify-content:center; cursor:pointer; transition:var(--transition);
    }
    .icon-btn:hover { background:#e8e4da; }
    .menu-dropdown {
      position:absolute; right:0; top:110%; background:var(--bg-card); border-radius:var(--radius-sm);
      box-shadow:var(--shadow); min-width:200px; padding:8px 0; display:none; z-index:1500;
      border:1px solid var(--border);
    }
    .menu-dropdown button {
      display:flex; align-items:center; gap:10px; width:100%; padding:10px 16px;
      background:transparent; border:none; color:var(--text-primary); font-size:0.9rem;
      cursor:pointer; transition:background 0.15s; text-align:left;
    }
    .menu-dropdown button:hover { background:rgba(0,0,0,0.04); }
    .menu-dropdown .danger { color:var(--danger); }
    .menu-sep { height:1px; background:var(--border); margin:6px 0; }

    /* FIX CRITICO: .main deve avere min-height:0 per permettere al figlio flex di restringersi */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    /* FIX CRITICO: #map deve avere min-height:0 per non collassare */
    #map {
      flex: 1;
      min-height: 0;
      width: 100%;
      z-index: 1;
    }

    .panel {
      background:var(--bg-card); border-top:1px solid var(--border);
      max-height:45vh; overflow-y:auto; z-index:10; display:flex; flex-direction:column;
      box-shadow:0 -4px 20px rgba(0,0,0,0.08); border-radius:20px 20px 0 0;
      flex-shrink: 0;
    }
    .panel-grip {
      padding:12px 16px 4px; cursor:row-resize; position:sticky; top:0;
      background:var(--bg-card); z-index:5; border-radius:20px 20px 0 0; text-align:center;
    }
    .grip-bar { display:inline-block; width:40px; height:5px; background:#ccc; border-radius:10px; margin-bottom:6px; }
    .panel-header { padding: 0 16px 8px; }
    .panel-header h1 { font-size:1.2rem; font-weight:700; margin:0 0 8px; color:var(--text-primary); }
    .progress-track { height:6px; background:#e8e4da; border-radius:10px; margin:6px 0; overflow:hidden; }
    .progress-fill { height:100%; width:0%; background:var(--accent); border-radius:10px; transition:width 0.3s ease; }
    #routeProgress { font-size: 0.8rem; color: var(--text-secondary); }
    .steps-container { padding:8px 16px; flex:1; display:flex; flex-direction:column; gap:8px; }
    .step-item {
      display:flex; align-items:center; gap:12px; padding:12px;
      background:var(--bg-input); border-radius:var(--radius-sm);
      transition:all 0.2s; border:1px solid transparent; cursor:pointer;
    }
    .step-item.active { border-color:var(--accent); background:#fff8e6; box-shadow:0 0 12px rgba(240,185,11,0.15); }
    .step-item.editing { border-color:var(--accent-glow); background:#fffbf0; }
    .step-num { font-weight:800; color:var(--accent); min-width:28px; text-align:center; background:rgba(240,185,11,0.15); border-radius:20px; padding:4px 0; font-size:0.85rem; }
    .step-name { font-weight:500; flex:1; color:var(--text-primary); }
    .step-name.blurred { filter:blur(4px); opacity:0.4; pointer-events:none; }
    .step-coords { font-size:0.7rem; color:var(--text-secondary); margin-left:8px; white-space:nowrap; }
    .panel-footer {
      padding:10px 16px 20px; display:flex; flex-direction:column; gap:10px;
      border-top:1px solid var(--border); background:var(--bg-card);
      position:sticky; bottom:0;
    }
    .btn-row { display:flex; gap:8px; justify-content:center; align-items:center; flex-wrap:wrap; }
    .btn {
      border:1px solid var(--border); border-radius:30px; font-weight:600; cursor:pointer;
      transition:all 0.2s; background:var(--bg-input); color:var(--text-primary);
      padding:10px 18px; font-size:0.9rem; display:inline-flex; align-items:center; gap:6px;
    }
    .btn:active { transform:scale(0.96); }
    .btn-circle { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.3rem; padding:0; }
    .btn-pill { border-radius:30px; }
    .btn-amber { background:var(--accent); color:#fff; font-weight:700; border-color:var(--accent); }
    .btn-ghost { background:transparent; border:1px dashed var(--accent); color:var(--accent); }
    .btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .btn-secondary { background:var(--bg-input); color:var(--text-secondary); }
    .reveal-btn-wrap { display:flex; justify-content:center; margin-bottom:8px; }
    .quiz-input-row { display:flex; gap:8px; }
    #quizAnswer {
      flex:1; padding:12px; border-radius:30px; border:1px solid var(--border);
      background:var(--bg-input); color:var(--text-primary); font-size:1rem; outline:none;
    }
    #quizAnswer:focus { border-color:var(--accent); }
    .quiz-feedback { font-weight:600; text-align:center; min-height:24px; }

    /* Modals */
    .modal {
      position:fixed; inset:0; background:rgba(0,0,0,0.4);
      backdrop-filter:blur(6px); display:none; align-items:center;
      justify-content:center; z-index:3000; padding:20px;
    }
    .modal-box {
      background:var(--bg-card); padding:24px; border-radius:var(--radius);
      width:100%; max-width:500px; box-shadow:var(--shadow);
    }
    .modal-box-sm { max-width:320px; }
    .modal-box h3 { margin-bottom:16px; color:var(--text-primary); }
    .modal-box p { color:var(--text-secondary); margin-bottom:16px; }
    .modal-box input, .modal-box textarea {
      width:100%; padding:12px; margin:8px 0 16px;
      background:var(--bg-input); border:1px solid var(--border);
      border-radius:var(--radius-sm); color:var(--text-primary); font-family:inherit; outline:none;
    }
    .modal-box input:focus, .modal-box textarea:focus { border-color:var(--accent); }
    .modal-buttons { display:flex; justify-content:flex-end; gap:10px; flex-wrap:wrap; }
    .btn-close, .btn-save {
      padding:10px 20px; border-radius:30px; border:none; font-weight:600; cursor:pointer;
    }
    .btn-close { background:var(--bg-input); color:var(--text-primary); border:1px solid var(--border); }
    .btn-save { background:var(--accent); color:#fff; }
    .btn-danger { background:var(--danger) !important; color:#fff !important; }

    .toast {
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
      background:#1a1a2e; color:white; padding:12px 24px; border-radius:30px;
      font-weight:600; z-index:4000; opacity:0; transition:opacity 0.3s; pointer-events:none;
      white-space:nowrap; max-width:90vw; text-align:center;
    }
    .editing-banner {
      background:var(--accent); color:#fff; text-align:center; padding:8px;
      font-weight:600; font-size:0.85rem;
    }

    @media (min-width: 768px) {
      .main { flex-direction:row; }
      .panel {
        width:380px; max-height:100%; border-radius:0;
        border-top:none; border-left:1px solid var(--border);
        flex-shrink: 0;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand"><span class="brand-icon">🧭</span><span class="brand-name">NCC Pilot</span></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchBar" placeholder="Cerca un percorso…" autocomplete="off">
      <ul class="suggestions" id="suggestionsList"></ul>
    </div>
    <div class="mode-switch" id="modeSwitch">
      <button class="mode-btn active" data-mode="studio">Studio</button>
      <button class="mode-btn" data-mode="esame">Esame</button>
      <button class="mode-btn" data-mode="quiz">Quiz</button>
    </div>
    <div class="actions">
      <button class="icon-btn" id="menuToggle" aria-label="Menu">⋮</button>
      <div class="menu-dropdown" id="menuDropdown">
        <button data-action="add">➕ Nuovo percorso</button>
        <button data-action="random">🔀 Percorso casuale</button>
        <button data-action="manage">📋 Gestisci percorsi</button>
        <button data-action="cloud-save">☁️ Salva su cloud</button>
        <button data-action="export">📤 Esporta dati</button>
        <button data-action="import">📥 Importa dati</button>
        <div class="menu-sep"></div>
        <button data-action="reset" class="danger">🗑️ Reset dati</button>
      </div>
    </div>
  </header>

  <main class="main">
    <div id="map"></div>
    <section class="panel" id="panel">
      <div class="panel-grip" id="panelGrip"><span class="grip-bar"></span></div>
      <div id="editingBanner" class="editing-banner" style="display:none;">📍 Clicca su una via, poi sulla mappa per posizionarla</div>
      <div class="panel-header">
        <h1 id="currentRouteTitle">Seleziona un percorso</h1>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <p id="routeProgress">Nessun percorso attivo</p>
      </div>
      <div class="steps-container" id="stepsList"></div>
      <div class="panel-footer">
        <div id="normalFooter">
          <div class="reveal-btn-wrap">
            <button class="btn btn-ghost" id="btnReveal" style="display:none;">👁️ Scopri via</button>
          </div>
          <div class="btn-row">
            <button class="btn btn-circle" id="btnPrev" disabled>‹</button>
            <button class="btn btn-pill btn-amber" id="btnStreet" disabled>👁️ Street View</button>
            <button class="btn btn-circle btn-primary" id="btnNext" disabled>›</button>
          </div>
        </div>
        <div id="quizFooter" style="display:none;">
          <div class="quiz-input-row">
            <input id="quizAnswer" placeholder="Scrivi il nome della via…" autocomplete="off">
            <button class="btn btn-circle btn-primary" id="btnQuizCheck">➜</button>
          </div>
          <div class="quiz-feedback" id="quizFeedback"></div>
          <div class="btn-row">
            <button class="btn btn-secondary" id="btnQuizSkip">⏭️ Salta</button>
            <button class="btn btn-secondary" id="btnQuizReveal">👁️ Mostra</button>
          </div>
        </div>
        <div id="editFooter" style="display:none;">
          <div class="btn-row">
            <button class="btn btn-primary" id="btnFinishEdit">✅ Termina modifiche</button>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>

<!-- Modale nuovo/modifica percorso -->
<div class="modal" id="routeModal">
  <div class="modal-box">
    <h3 id="modalTitle">➕ Nuovo percorso</h3>
    <input type="text" id="newRouteTitle" placeholder="TITOLO (es. LINATE - OSPEDALE)">
    <textarea id="newRouteSteps" rows="5" placeholder="Incolla l'elenco delle vie (una per riga)"></textarea>
    <div class="modal-buttons">
      <button class="btn-close" id="btnCancelRoute">Annulla</button>
      <button class="btn-save" id="btnSaveRoute">Salva e posiziona</button>
    </div>
  </div>
</div>

<!-- Modale gestione percorsi -->
<div class="modal" id="routesManagerModal">
  <div class="modal-box">
    <h3>📋 Percorsi salvati</h3>
    <div id="routesManagerList" style="max-height:300px;overflow-y:auto;"></div>
    <div class="modal-buttons" style="margin-top:16px;">
      <button class="btn-close" id="btnCloseManager">Chiudi</button>
    </div>
  </div>
</div>

<!-- Modale conferma -->
<div class="modal" id="confirmModal">
  <div class="modal-box modal-box-sm">
    <h3>⚠️ Conferma</h3>
    <p id="confirmMessage">Sei sicuro?</p>
    <div class="modal-buttons">
      <button class="btn-close" id="confirmNo">Annulla</button>
      <button class="btn-save btn-danger" id="confirmYes">Conferma</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  (function() {
    // ---------- FIREBASE (inserisci la tua config reale per attivare il cloud) ----------
    const firebaseConfig = {
      apiKey: "AIzaSyDplaceholder",
      authDomain: "ncc-pilot.firebaseapp.com",
      databaseURL: "https://ncc-pilot-default-rtdb.firebaseio.com",
      projectId: "ncc-pilot",
      storageBucket: "ncc-pilot.appspot.com",
      messagingSenderId: "000000000000",
      appId: "1:000000000000:web:xxxxxxxxxxxxxxxx"
    };
    let firebaseReady = false;
    try {
      firebase.initializeApp(firebaseConfig);
      firebaseReady = true;
    } catch(e) {
      console.warn("Firebase non configurato, uso solo localStorage.");
    }

    const STORAGE_KEY = 'ncc_pilot_routes_v2';
    let routes = [];
    let currentRouteId = null;
    let currentStepIndex = 0;
    let mode = 'studio';
    let map, markersLayer;
    let editingRouteId = null;
    let selectedEditStepIndex = null;

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2, 10);
    }

    const $ = (s) => document.querySelector(s);
    const $$ = (s) => document.querySelectorAll(s);

    const searchBar = $('#searchBar');
    const suggestionsList = $('#suggestionsList');
    const modeBtns = $$('.mode-btn');
    const menuToggle = $('#menuToggle');
    const menuDropdown = $('#menuDropdown');
    const currentRouteTitle = $('#currentRouteTitle');
    const progressFill = $('#progressFill');
    const routeProgress = $('#routeProgress');
    const stepsList = $('#stepsList');
    const btnPrev = $('#btnPrev');
    const btnNext = $('#btnNext');
    const btnStreet = $('#btnStreet');
    const btnReveal = $('#btnReveal');
    const normalFooter = $('#normalFooter');
    const quizFooter = $('#quizFooter');
    const editFooter = $('#editFooter');
    const editingBanner = $('#editingBanner');
    const quizAnswer = $('#quizAnswer');
    const quizFeedback = $('#quizFeedback');
    const routeModal = $('#routeModal');
    const newRouteTitle = $('#newRouteTitle');
    const newRouteSteps = $('#newRouteSteps');
    const modalTitle = $('#modalTitle');
    const routesManagerModal = $('#routesManagerModal');
    const routesManagerList = $('#routesManagerList');
    const confirmModal = $('#confirmModal');
    const confirmMessage = $('#confirmMessage');
    const toast = $('#toast');
    let confirmCallback = null;

    // ---------- MAPPA: tile layer CHIARO (CartoDB Positron) ----------
    function initMap() {
      map = L.map('map', {
        center: [45.4642, 9.1900],
        zoom: 13,
        zoomControl: false,
        attributionControl: false
      });

      // Tile layer chiaro: OpenStreetMap (massima compatibilità mobile)
      const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        subdomains: ['a','b','c'],
        crossOrigin: true
      });

      // Fallback: CartoDB Positron se OSM non carica
      const cartoLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        crossOrigin: true
      });

      osmLayer.addTo(map);
      // Dopo 5 sec, se nessuna tile è arrivata, switcha su CartoDB
      let tilesLoaded = false;
      osmLayer.on('tileload', () => { tilesLoaded = true; });
      setTimeout(() => {
        if (!tilesLoaded) {
          map.removeLayer(osmLayer);
          cartoLayer.addTo(map);
        }
      }, 5000);

      L.control.zoom({ position: 'bottomright' }).addTo(map);
      markersLayer = L.layerGroup().addTo(map);

      map.on('click', (e) => {
        if (editingRouteId && selectedEditStepIndex !== null) {
          const route = routes.find(r => r.id === editingRouteId);
          if (!route) return;
          const step = route.steps[selectedEditStepIndex];
          if (!step) return;
          step.lat = e.latlng.lat;
          step.lng = e.latlng.lng;
          updateAllMarkers();
          renderSteps();
          showToast(`📍 Posizione salvata per "${step.name}"`);
          selectedEditStepIndex = null;
          highlightSelectedStep(null);
        }
      });
    }

    function updateAllMarkers() {
      markersLayer.clearLayers();
      if (!currentRouteId) return;
      const route = routes.find(r => r.id === currentRouteId);
      if (!route) return;
      const coords = [];
      route.steps.forEach((step, idx) => {
        if (step.lat !== null && step.lng !== null) {
          const latlng = [step.lat, step.lng];
          coords.push(latlng);
          const marker = L.circleMarker(latlng, {
            radius: idx === currentStepIndex ? 10 : 7,
            color: idx === currentStepIndex ? '#e8a800' : '#6b7a99',
            fillColor: idx === currentStepIndex ? '#f0b90b' : '#fff',
            fillOpacity: 0.95,
            weight: 2.5
          }).bindPopup(`<b>${idx+1}.</b> ${step.name}`);
          markersLayer.addLayer(marker);
        }
      });
      if (coords.length > 1) {
        const line = L.polyline(coords, { color: '#e8a800', weight: 4, opacity: 0.75, dashArray: '10 6' });
        markersLayer.addLayer(line);
        map.fitBounds(line.getBounds().pad(0.2));
      } else if (coords.length === 1) {
        map.setView(coords[0], 15);
      }
    }

    function renderSteps() {
      if (!currentRouteId) {
        stepsList.innerHTML = '<p style="opacity:0.5;text-align:center;padding:20px;">Nessun percorso selezionato</p>';
        updateFooterVisibility();
        return;
      }
      const route = routes.find(r => r.id === currentRouteId);
      if (!route) return;
      currentRouteTitle.textContent = route.title;
      const steps = route.steps;
      stepsList.innerHTML = steps.map((step, idx) => {
        let nameDisplay = step.name;
        const isEditing = editingRouteId === route.id;
        if (!isEditing) {
          if (mode === 'esame' && idx !== currentStepIndex) nameDisplay = '???';
          if (mode === 'quiz') nameDisplay = '???';
        }
        const activeClass = (idx === currentStepIndex && !isEditing) ? 'active' : '';
        const editClass = (isEditing && idx === selectedEditStepIndex) ? 'editing' : '';
        const blurredClass = (!isEditing && (mode === 'esame' || mode === 'quiz') && idx !== currentStepIndex) ? 'blurred' : '';
        const coordsText = (step.lat !== null && step.lng !== null)
          ? `📍 ${step.lat.toFixed(4)},${step.lng.toFixed(4)}`
          : '⚠️ da posizionare';
        return `<div class="step-item ${activeClass} ${editClass}" data-index="${idx}">
                  <span class="step-num">${idx+1}</span>
                  <span class="step-name ${blurredClass}">${nameDisplay}</span>
                  <span class="step-coords">${coordsText}</span>
                </div>`;
      }).join('');

      const total = steps.length;
      const positioned = steps.filter(s => s.lat !== null && s.lng !== null).length;
      progressFill.style.width = total ? `${(positioned/total)*100}%` : '0%';
      routeProgress.textContent = `Posizionate ${positioned} di ${total} vie`;

      updateFooterVisibility();
      updateAllMarkers();
    }

    function updateFooterVisibility() {
      const isEditing = !!editingRouteId;
      editingBanner.style.display = isEditing ? 'block' : 'none';
      normalFooter.style.display = (!isEditing && mode !== 'quiz') ? 'block' : 'none';
      quizFooter.style.display = (!isEditing && mode === 'quiz') ? 'block' : 'none';
      editFooter.style.display = isEditing ? 'block' : 'none';

      if (!isEditing) {
        btnReveal.style.display = (mode === 'esame') ? 'inline-flex' : 'none';
        const route = routes.find(r => r.id === currentRouteId);
        if (route) {
          btnPrev.disabled = currentStepIndex <= 0;
          btnNext.disabled = currentStepIndex >= route.steps.length - 1;
          btnStreet.disabled = false;
        } else {
          btnPrev.disabled = true;
          btnNext.disabled = true;
          btnStreet.disabled = true;
        }
      }
    }

    function highlightSelectedStep(index) {
      $$('.step-item').forEach((el, i) => {
        if (i === index && editingRouteId) el.classList.add('editing');
        else el.classList.remove('editing');
      });
    }

    function goToStep(index) {
      const route = routes.find(r => r.id === currentRouteId);
      if (!route) return;
      const max = route.steps.length - 1;
      if (index < 0) index = 0;
      if (index > max) index = max;
      currentStepIndex = index;
      renderSteps();
      if (mode === 'quiz') { quizAnswer.value = ''; quizFeedback.textContent = ''; }
    }

    function selectRoute(routeId) {
      currentRouteId = routeId;
      currentStepIndex = 0;
      editingRouteId = null;
      selectedEditStepIndex = null;
      renderSteps();
    }

    function setMode(newMode) {
      mode = newMode;
      updateModeButtons();
      if (!editingRouteId) renderSteps();
      if (mode === 'quiz') { quizAnswer.value = ''; quizFeedback.textContent = ''; }
    }
    function updateModeButtons() {
      modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    }

    function startEditing(routeId) {
      editingRouteId = routeId;
      selectedEditStepIndex = null;
      currentStepIndex = 0;
      renderSteps();
    }

    function stopEditing() {
      editingRouteId = null;
      selectedEditStepIndex = null;
      renderSteps();
      saveToLocal();
      showToast('Percorso salvato localmente');
    }

    stepsList.addEventListener('click', (e) => {
      const stepItem = e.target.closest('.step-item');
      if (!stepItem) return;
      const index = parseInt(stepItem.dataset.index, 10);
      if (isNaN(index)) return;
      if (editingRouteId) {
        selectedEditStepIndex = index;
        highlightSelectedStep(index);
        const route = routes.find(r => r.id === editingRouteId);
        showToast(`Selezionata "${route.steps[index].name}". Ora clicca sulla mappa.`);
      } else {
        goToStep(index);
      }
    });

    function checkQuizAnswer() {
      const route = routes.find(r => r.id === currentRouteId);
      if (!route) return;
      const correct = route.steps[currentStepIndex].name;
      const userAnswer = quizAnswer.value.trim();
      if (userAnswer.toLowerCase() === correct.toLowerCase()) {
        quizFeedback.innerHTML = '✅ Corretto!';
        quizFeedback.style.color = 'var(--success)';
        setTimeout(() => {
          if (currentStepIndex < route.steps.length-1) goToStep(currentStepIndex+1);
          else quizFeedback.textContent = '🎉 Percorso completato!';
        }, 600);
      } else {
        quizFeedback.innerHTML = '❌ Riprova';
        quizFeedback.style.color = 'var(--danger)';
      }
    }

    function openAddRouteModal(editRouteId = null) {
      if (editRouteId) {
        const route = routes.find(r => r.id === editRouteId);
        if (!route) return;
        modalTitle.textContent = '✏️ Modifica percorso';
        newRouteTitle.value = route.title;
        newRouteSteps.value = route.steps.map(s => s.name).join('\n');
        routeModal.dataset.editId = editRouteId;
      } else {
        modalTitle.textContent = '➕ Nuovo percorso';
        newRouteTitle.value = '';
        newRouteSteps.value = '';
        delete routeModal.dataset.editId;
      }
      routeModal.style.display = 'flex';
    }

    function saveRouteFromModal() {
      const title = newRouteTitle.value.trim();
      const stepsRaw = newRouteSteps.value.trim();
      if (!title || !stepsRaw) { showToast('Inserisci titolo e vie'); return; }
      const stepNames = stepsRaw.split('\n').map(s => s.trim()).filter(s => s);
      if (!stepNames.length) return;

      const editId = routeModal.dataset.editId;
      let route;
      if (editId) {
        route = routes.find(r => r.id === editId);
        if (!route) return;
        route.title = title;
        const oldSteps = route.steps;
        route.steps = stepNames.map(name => {
          const existing = oldSteps.find(s => s.name === name);
          return existing ? { ...existing } : { id: generateId(), name, lat: null, lng: null };
        });
      } else {
        route = {
          id: generateId(), title,
          steps: stepNames.map(name => ({ id: generateId(), name, lat: null, lng: null }))
        };
        routes.push(route);
      }
      saveToLocal();
      routeModal.style.display = 'none';
      selectRoute(route.id);
      startEditing(route.id);
    }

    function openManageModal() {
      routesManagerList.innerHTML = routes.length
        ? routes.map(r => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
            <span style="cursor:pointer;flex:1;color:var(--text-primary);font-weight:500;" data-id="${r.id}">${r.title} <span style="color:var(--text-secondary);font-size:0.8rem;font-weight:400;">(${r.steps.length} vie)</span></span>
            <button class="btn-close" style="padding:4px 10px;margin-left:8px;" data-edit="${r.id}">✏️</button>
            <button class="btn-close" style="padding:4px 10px;color:var(--danger);" data-delete="${r.id}">🗑️</button>
          </div>`).join('')
        : '<p style="color:var(--text-secondary);text-align:center;padding:20px;">Nessun percorso</p>';

      routesManagerList.querySelectorAll('span[data-id]').forEach(span => {
        span.addEventListener('click', () => { selectRoute(span.dataset.id); routesManagerModal.style.display='none'; });
      });
      routesManagerList.querySelectorAll('[data-edit]').forEach(btn => {
        btn.addEventListener('click', () => { openAddRouteModal(btn.dataset.edit); routesManagerModal.style.display='none'; });
      });
      routesManagerList.querySelectorAll('[data-delete]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.delete;
          const route = routes.find(r => r.id === id);
          confirmMessage.textContent = `Eliminare "${route?.title}"?`;
          confirmCallback = () => {
            routes = routes.filter(r => r.id !== id);
            saveToLocal();
            if (currentRouteId === id) {
              currentRouteId = routes.length ? routes[0].id : null;
              currentStepIndex = 0; editingRouteId = null;
              renderSteps();
            }
            openManageModal();
          };
          confirmModal.style.display = 'flex';
        });
      });
      routesManagerModal.style.display = 'flex';
    }

    function selectRandomRoute() {
      if (!routes.length) return;
      selectRoute(routes[Math.floor(Math.random() * routes.length)].id);
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(routes, null, 2)], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'ncc_pilot_backup.json';
      a.click();
      showToast('Dati esportati');
    }

    function importData() {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = '.json';
      input.onchange = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (Array.isArray(data)) {
              routes = data; saveToLocal(); currentRouteId = null; editingRouteId = null;
              renderSteps(); showToast('Dati importati');
            }
          } catch(ex) { showToast('File non valido'); }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    function confirmReset() {
      confirmMessage.textContent = 'Cancellare tutti i percorsi?';
      confirmCallback = () => {
        routes = []; saveToLocal(); currentRouteId = null; editingRouteId = null;
        renderSteps(); showToast('Dati resettati');
      };
      confirmModal.style.display = 'flex';
    }

    function saveToLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify(routes)); }

    function loadFromLocal() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) { try { routes = JSON.parse(stored); } catch(e) { routes = []; } }
      if (!routes.length) {
        routes.push({
          id: generateId(), title: 'MILANO CENTRALE - DUOMO',
          steps: [
            { id: generateId(), name: "Piazza Duca d'Aosta", lat: 45.4858, lng: 9.2030 },
            { id: generateId(), name: 'Via Vitruvio', lat: 45.4835, lng: 9.2015 },
            { id: generateId(), name: 'Corso Buenos Aires', lat: 45.4795, lng: 9.2080 },
            { id: generateId(), name: 'Piazza del Duomo', lat: 45.4641, lng: 9.1919 }
          ]
        });
        routes.push({
          id: generateId(), title: 'LINATE - STAZIONE CENTRALE',
          steps: [
            { id: generateId(), name: 'Aeroporto di Linate', lat: 45.4610, lng: 9.2791 },
            { id: generateId(), name: 'Viale Enrico Forlanini', lat: 45.4632, lng: 9.2528 },
            { id: generateId(), name: 'Corso XXII Marzo', lat: 45.4690, lng: 9.2205 },
            { id: generateId(), name: "Piazza Duca d'Aosta", lat: 45.4858, lng: 9.2030 }
          ]
        });
        saveToLocal();
      }
    }

    async function saveToFirebase() {
      if (!firebaseReady) { showToast('Firebase non configurato.'); return; }
      try { await firebase.database().ref('routes').set(routes); showToast('☁️ Salvato su cloud!'); }
      catch(e) { showToast('Errore salvataggio cloud'); }
    }

    async function loadFromFirebase() {
      if (!firebaseReady) return false;
      try {
        const snap = await firebase.database().ref('routes').once('value');
        const data = snap.val();
        if (data && Array.isArray(data)) { routes = data; saveToLocal(); return true; }
      } catch(e) { console.warn('Firebase fallito, uso locale.'); }
      return false;
    }

    async function initApp() {
      loadFromLocal();
      const cloudLoaded = await loadFromFirebase();
      if (cloudLoaded) showToast('Dati cloud caricati');
      initMap(); // FIX: la mappa va inizializzata DOPO che il DOM è pronto e il layout è definito
      if (routes.length > 0) selectRoute(routes[0].id);
      else renderSteps();
      setMode('studio');
    }

    // ---------- EVENT LISTENERS ----------
    menuToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      menuDropdown.style.display = menuDropdown.style.display === 'block' ? 'none' : 'block';
    });
    document.addEventListener('click', () => { menuDropdown.style.display = 'none'; });

    menuDropdown.addEventListener('click', (e) => {
      const action = e.target.closest('button')?.dataset.action;
      if (!action) return;
      menuDropdown.style.display = 'none';
      if (action === 'add') openAddRouteModal();
      else if (action === 'random') selectRandomRoute();
      else if (action === 'manage') openManageModal();
      else if (action === 'cloud-save') saveToFirebase();
      else if (action === 'export') exportData();
      else if (action === 'import') importData();
      else if (action === 'reset') confirmReset();
    });

    modeBtns.forEach(btn => btn.addEventListener('click', () => setMode(btn.dataset.mode)));

    btnPrev.addEventListener('click', () => goToStep(currentStepIndex - 1));
    btnNext.addEventListener('click', () => goToStep(currentStepIndex + 1));
    btnReveal.addEventListener('click', () => {
      if (mode === 'esame' && !editingRouteId) {
        const nameSpan = $$('.step-item')[currentStepIndex]?.querySelector('.step-name');
        if (nameSpan) nameSpan.classList.remove('blurred');
      }
    });
    btnStreet.addEventListener('click', () => {
      const route = routes.find(r => r.id === currentRouteId);
      if (!route) return;
      const step = route.steps[currentStepIndex];
      if (!step) return;
      window.open(`https://www.google.com/maps?q=${encodeURIComponent(step.name + ', Milano')}&layer=c`, '_blank');
    });

    $('#btnQuizCheck').addEventListener('click', checkQuizAnswer);
    quizAnswer.addEventListener('keydown', (e) => { if (e.key === 'Enter') checkQuizAnswer(); });
    $('#btnQuizSkip').addEventListener('click', () => {
      const route = routes.find(r => r.id === currentRouteId);
      if (!route) return;
      if (currentStepIndex < route.steps.length-1) goToStep(currentStepIndex+1);
      else quizFeedback.textContent = 'Fine percorso';
    });
    $('#btnQuizReveal').addEventListener('click', () => {
      const route = routes.find(r => r.id === currentRouteId);
      const nameSpan = $$('.step-item')[currentStepIndex]?.querySelector('.step-name');
      if (nameSpan && route) {
        nameSpan.classList.remove('blurred');
        nameSpan.textContent = route.steps[currentStepIndex].name;
      }
    });

    $('#btnFinishEdit').addEventListener('click', stopEditing);
    $('#btnCancelRoute').addEventListener('click', () => routeModal.style.display='none');
    $('#btnSaveRoute').addEventListener('click', saveRouteFromModal);
    $('#btnCloseManager').addEventListener('click', () => routesManagerModal.style.display='none');
    $('#confirmNo').addEventListener('click', () => { confirmModal.style.display='none'; confirmCallback=null; });
    $('#confirmYes').addEventListener('click', () => {
      if (confirmCallback) confirmCallback();
      confirmModal.style.display='none'; confirmCallback=null;
    });
    window.addEventListener('click', (e) => {
      if (e.target === routeModal) routeModal.style.display='none';
      if (e.target === routesManagerModal) routesManagerModal.style.display='none';
      if (e.target === confirmModal) confirmModal.style.display='none';
    });

    // Panel resize mobile
    const panel = $('#panel');
    let startY, startHeight;
    panel.addEventListener('touchstart', (e) => {
      if (e.target.closest('.panel-grip')) {
        startY = e.touches[0].clientY;
        startHeight = panel.offsetHeight;
        e.preventDefault();
      }
    }, { passive: false });
    panel.addEventListener('touchmove', (e) => {
      if (startY !== undefined) {
        const dy = startY - e.touches[0].clientY;
        panel.style.maxHeight = Math.max(120, Math.min(window.innerHeight*0.8, startHeight+dy)) + 'px';
      }
    });
    panel.addEventListener('touchend', () => { startY = undefined; });

    function showToast(msg) {
      toast.textContent = msg;
      toast.style.opacity = '1';
      setTimeout(() => { toast.style.opacity = '0'; }, 2500);
    }

    initApp();
  })();
</script>
</body>
</html>
