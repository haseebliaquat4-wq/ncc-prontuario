<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Prontuario NCC - Edizione Moderna</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylinedecorator.css" />
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg-color: #121212;
            --surface: #1e1e1e;
            --surface-light: #2c2c2c;
            --accent: #f59e0b; /* Giallo/Oro per un look premium */
            --accent-hover: #d97706;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --success: #10b981;
            --danger: #ef4444;
            --border-radius: 24px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Bar Floating */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .search-box {
            flex: 1;
            background: var(--surface);
            border-radius: var(--border-radius);
            padding: 0 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .search-box input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 16px 0;
            font-size: 16px;
            outline: none;
        }

        .icon-btn {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.05);
            color: var(--text-primary);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            font-size: 20px;
        }

        .icon-btn:active { transform: scale(0.95); background: var(--surface-light); }

        /* Map Area */
        #map {
            flex: 1;
            height: 100%;
            z-index: 1;
            background: var(--bg-color);
        }

        /* Bottom Sheet (Il vero centro nevralgico) */
        .bottom-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--surface);
            border-radius: 32px 32px 0 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            max-height: 60vh;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background: var(--surface-light);
            border-radius: 2px;
            margin: 12px auto;
        }

        .sheet-header {
            padding: 0 24px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .route-info h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .route-info p { font-size: 14px; color: var(--accent); font-weight: 600; }

        /* Mode Selector Moderno */
        .mode-selector {
            display: flex;
            background: var(--surface-light);
            border-radius: 12px;
            padding: 4px;
        }

        .mode-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: var(--accent);
            color: var(--bg-color);
        }

        /* Steps List */
        .steps-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
            scroll-behavior: smooth;
        }

        .step-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 0;
            opacity: 0.5;
            transition: all 0.3s ease;
        }

        .step-row.completed { opacity: 0.8; }
        .step-row.active {
            opacity: 1;
            transform: scale(1.02);
            transform-origin: left center;
        }

        .step-indicator {
            width: 32px;
            height: 32px;
            background: var(--surface-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-secondary);
            border: 2px solid transparent;
        }

        .step-row.active .step-indicator {
            background: rgba(245, 158, 11, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .step-name { flex: 1; font-size: 16px; font-weight: 500; }
        
        .hidden-mode .step-name {
            background: var(--surface-light);
            color: transparent;
            border-radius: 8px;
            user-select: none;
        }
        
        .hidden-mode .step-row.revealed .step-name {
            background: transparent;
            color: var(--text-primary);
        }

        .place-btn {
            background: rgba(245, 158, 11, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 6px 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .place-btn:active { background: var(--accent); color: var(--bg-color); }

        /* Controls Footer */
        .controls-footer {
            padding: 16px 24px 24px;
            background: var(--surface);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .action-row { display: flex; gap: 12px; }

        .btn {
            flex: 1;
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-primary { background: var(--accent); color: var(--bg-color); }
        .btn-primary:active { background: var(--accent-hover); }
        .btn-secondary { background: var(--surface-light); color: var(--text-primary); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Quiz UI */
        #quizFooter { display: none; }
        .quiz-input-group { display: flex; gap: 12px; margin-bottom: 12px; }
        .quiz-input-group input {
            flex: 1;
            background: var(--surface-light);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 16px;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        .quiz-input-group input:focus { border-color: var(--accent); }

        /* Placing Mode Map Border */
        body.placing-active #map { border: 4px solid var(--accent); }

        /* Media Queries per Desktop */
        @media (min-width: 768px) {
            body { flex-direction: row; }
            .top-bar { width: calc(100% - 420px); }
            .bottom-sheet {
                position: relative;
                width: 420px;
                max-height: 100vh;
                border-radius: 0;
                border-left: 1px solid rgba(255,255,255,0.05);
            }
            .sheet-handle { display: none; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="searchBar" placeholder="Cerca percorso (es. Linate - San Siro)..." autocomplete="off" oninput="showSuggestions()">
        </div>
        <button class="icon-btn" onclick="selectRandomRoute()" title="Percorso Casuale">🔀</button>
        <button class="icon-btn" onclick="openAddModal()" title="Aggiungi">➕</button>
    </div>

    <div id="map"></div>

    <div class="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
            <div class="route-info">
                <h2 id="currentRouteTitle">Seleziona un percorso</h2>
                <p id="routeProgress">In attesa...</p>
            </div>
            <div class="mode-selector">
                <button class="mode-btn active" id="modeStudio" onclick="setMode('studio')">Visivo</button>
                <button class="mode-btn" id="modeEsame" onclick="setMode('esame')">Cieco</button>
                <button class="mode-btn" id="modeQuiz" onclick="setMode('quiz')">Quiz</button>
            </div>
        </div>

        <div class="steps-container" id="stepsList"></div>

        <div class="controls-footer">
            <div id="normalFooter" class="action-row">
                <button class="btn btn-secondary" id="btnPrev" onclick="prevStep()" disabled>◀ Indietro</button>
                <button class="btn btn-primary" id="btnNext" onclick="nextStep()" disabled>Avanti ▶</button>
            </div>
            
            <div id="quizFooter">
                <div class="quiz-input-group">
                    <input type="text" id="quizAnswer" placeholder="Digita il nome della via...">
                    <button class="btn btn-primary" style="flex: 0 0 60px;" onclick="checkQuiz()">✓</button>
                </div>
                <div id="quizFeedback" style="text-align:center; font-weight:bold; margin-bottom:12px; min-height: 20px;"></div>
                <div class="action-row">
                    <button class="btn btn-secondary" onclick="skipQuiz()">Salta</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylinedecorator.js"></script>
    <script>
        // Avviso Sicurezza: Non esporre le vere chiavi in produzione senza regole di sicurezza nel DB.
        const firebaseConfig = {
            apiKey: "INSERISCI_CHIAVE_SOLO_SE_PROTETTO",
            authDomain: "ncc-milano.firebaseapp.com",
            databaseURL: "https://ncc-milano-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "ncc-milano"
        };
        // firebase.initializeApp(firebaseConfig);
        // const db = firebase.database();

        const DEFAULT = [{
            id: "default_0",
            title: "CERCHIA DEI BASTIONI",
            steps: ["P.ZA 24 MAGGIO","V.LE GIAN GALEAZZO","P.LE DI PORTA LODOVICA","V.LE BEATRICE D'ESTE","L.GO ISABELLA D'ARAGONA"]
        }];

        let routes = JSON.parse(localStorage.getItem('routes')) || DEFAULT;
        let coords = JSON.parse(localStorage.getItem('coords')) || {};
        let map, currentRoute = null, currentStep = 0, marker = null;
        let doneLine = null, doneDecorator = null, nextLine = null;
        let mode = 'studio';
        let placingStepIndex = null;

        function initMap() {
            // Usa una mappa dark mode adatta al tema (CartoDB Dark Matter)
            map = L.map('map', { zoomControl: false }).setView([45.4642, 9.1900], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO'
            }).addTo(map);

            map.on('click', function(e) {
                if (placingStepIndex !== null && currentRoute) {
                    const key = `${currentRoute.id}_${placingStepIndex}`;
                    const name = currentRoute.steps[placingStepIndex];
                    coords[key] = { lat: e.latlng.lat, lon: e.latlng.lng };
                    localStorage.setItem('coords', JSON.stringify(coords));
                    placeMarker(e.latlng.lat, e.latlng.lng, name, key);
                    placingStepIndex = null;
                    document.body.classList.remove('placing-active');
                    renderSteps(); // Aggiorna UI per rimuovere il pulsante
                }
            });
        }

        function selectRoute(route) {
            currentRoute = route;
            currentStep = 0;
            if (marker) { map.removeLayer(marker); marker = null; }
            clearLines();
            document.getElementById('currentRouteTitle').textContent = route.title;
            renderSteps();
            updateUI();
            goToStep();
        }

        function renderSteps() {
            const container = document.getElementById('stepsList'); 
            container.innerHTML = '';
            
            currentRoute.steps.forEach((stepName, i) => {
                const key = `${currentRoute.id}_${i}`;
                const hasCoord = !!coords[key];
                
                const stepEl = document.createElement('div');
                stepEl.className = `step-row ${i === currentStep ? 'active' : (i < currentStep ? 'completed' : '')} ${mode !== 'studio' ? 'hidden-mode' : ''}`;
                stepEl.id = `step-${i}`;
                
                stepEl.innerHTML = `
                    <div class="step-indicator">${i + 1}</div>
                    <div class="step-name">${stepName}</div>
                    ${!hasCoord ? `<button class="place-btn" onclick="startPlacing(${i})">Posiziona Marker</button>` : ''}
                `;
                container.appendChild(stepEl);
            });

            // Auto-scroll allo step attivo
            const activeEl = document.getElementById(`step-${currentStep}`);
            if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        window.startPlacing = function(index) {
            placingStepIndex = index;
            document.body.classList.add('placing-active');
            alert('Tocca sulla mappa dove si trova questa via.');
        };

        function nextStep() {
            if (currentStep < currentRoute.steps.length - 1) {
                currentStep++;
                renderSteps(); updateUI(); goToStep();
            }
        }

        function prevStep() {
            if (currentStep > 0) {
                currentStep--;
                renderSteps(); updateUI(); goToStep();
            }
        }

        function updateUI() {
            document.getElementById('routeProgress').textContent = `Step ${currentStep + 1} di ${currentRoute.steps.length}`;
            document.getElementById('btnPrev').disabled = currentStep === 0;
            document.getElementById('btnNext').disabled = currentStep === currentRoute.steps.length - 1;
            
            document.getElementById('normalFooter').style.display = mode === 'quiz' ? 'none' : 'flex';
            document.getElementById('quizFooter').style.display = mode === 'quiz' ? 'block' : 'none';
        }

        function goToStep() {
            const stepName = currentRoute.steps[currentStep];
            const key = `${currentRoute.id}_${currentStep}`;
            
            if (coords[key]) {
                placeMarker(coords[key].lat, coords[key].lon, stepName, key);
                map.panTo([coords[key].lat, coords[key].lon]);
            }
        }

        function placeMarker(lat, lon, name, key) {
            // Icona custom dorata per adattarsi al tema
            const customIcon = L.divIcon({
                className: 'custom-marker',
                html: `<div style="background-color:#f59e0b; width:16px; height:16px; border-radius:50%; border:3px solid #121212; box-shadow: 0 0 10px rgba(245,158,11,0.8);"></div>`,
                iconSize: [16, 16],
                iconAnchor: [8, 8]
            });

            if (marker) {
                marker.setLatLng([lat, lon]);
                marker.setIcon(customIcon);
            } else {
                marker = L.marker([lat, lon], { icon: customIcon, draggable: true }).addTo(map);
            }
            
            marker.off('dragend');
            marker.on('dragend', () => {
                const p = marker.getLatLng();
                coords[key] = { lat: p.lat, lon: p.lng };
                localStorage.setItem('coords', JSON.stringify(coords));
                updateLines();
            });
            updateLines();
        }

        function updateLines() {
            clearLines();
            const done = [], rem = [];
            for (let i = 0; i <= currentStep; i++) {
                const k = `${currentRoute.id}_${i}`;
                if (coords[k]) done.push([coords[k].lat, coords[k].lon]);
            }
            for (let i = currentStep; i < currentRoute.steps.length; i++) {
                const k = `${currentRoute.id}_${i}`;
                if (coords[k]) rem.push([coords[k].lat, coords[k].lon]);
            }

            if (done.length > 1) {
                doneLine = L.polyline(done, { color: '#f59e0b', weight: 4, opacity: 1 }).addTo(map);
            }
            if (rem.length > 1) {
                nextLine = L.polyline(rem, { color: '#4b5563', weight: 3, opacity: 0.5, dashArray: '6 6' }).addTo(map);
            }
        }

        function clearLines() {
            if (doneLine) { map.removeLayer(doneLine); doneLine = null; }
            if (nextLine) { map.removeLayer(nextLine); nextLine = null; }
        }

        function setMode(m) {
            mode = m;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mode' + m.charAt(0).toUpperCase() + m.slice(1)).classList.add('active');
            if (currentRoute) renderSteps();
            updateUI();
            if (m === 'quiz') document.getElementById('quizAnswer').focus();
        }

        function checkQuiz() {
            const ans = document.getElementById('quizAnswer').value.trim().toUpperCase();
            const correct = currentRoute.steps[currentStep].toUpperCase();
            const fb = document.getElementById('quizFeedback');
            
            if (ans === correct) {
                fb.textContent = 'Esatto!'; 
                fb.style.color = 'var(--success)';
                document.getElementById('quizAnswer').value = '';
                setTimeout(() => nextStep(), 800);
            } else {
                fb.textContent = `Errore. La via è: ${correct}`; 
                fb.style.color = 'var(--danger)';
                // Rivela la riga
                document.getElementById(`step-${currentStep}`).classList.add('revealed');
            }
        }

        function skipQuiz() {
            document.getElementById('quizFeedback').textContent = `Saltato: ${currentRoute.steps[currentStep]}`;
            document.getElementById('quizFeedback').style.color = 'var(--accent)';
            document.getElementById(`step-${currentStep}`).classList.add('revealed');
            setTimeout(() => nextStep(), 1000);
        }

        function selectRandomRoute() {
            if (routes.length) selectRoute(routes[Math.floor(Math.random() * routes.length)]);
        }

        window.onload = function() {
            initMap();
            if (routes.length) selectRoute(routes[0]);
        };
    </script>
</body>
</html>
