<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Prontuario NCC Milano</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylinedecorator.css" />
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f1f5f9;
            color: #1e293b;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* ========== HEADER ========== */
        header {
            background: #0b1e33;
            color: white;
            padding: 10px 16px;
            z-index: 1000;
            flex-shrink: 0;
        }

        /* Mobile: tutto in una riga scrollabile */
        .header-row {
            display: flex;
            align-items: center;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 2px;
        }
        .header-row::-webkit-scrollbar { display: none; }

        /* PC: due righe — search sopra, chips sotto */
        .header-search { display: flex; align-items: center; gap: 8px; position: relative; }
        .header-chips  { display: none; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

        #searchBar {
            flex: 1;
            min-width: 0;
            padding: 10px 16px;
            border-radius: 24px;
            border: none;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 15px;
            outline: none;
        }
        #searchBar::placeholder { color: rgba(255,255,255,0.55); }

        .suggestions {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            max-height: 260px;
            overflow-y: auto;
            display: none;
            z-index: 2000;
            list-style: none;
        }
        .suggestions li {
            padding: 11px 16px;
            cursor: pointer;
            font-weight: 600;
            color: #1e293b;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
        }
        .suggestions li:last-child { border-bottom: none; }
        .suggestions li:hover { background: #eef4ff; }

        .chip {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.22);
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            min-height: 38px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: background 0.15s;
            flex-shrink: 0;
            user-select: none;
        }
        .chip:hover  { background: rgba(255,255,255,0.22); }
        .chip:active { background: rgba(255,255,255,0.32); }
        .chip.active { background: #3b82f6; border-color: #3b82f6; }
        .chip.danger { background: rgba(239,68,68,0.25); border-color: rgba(239,68,68,0.6); }
        .chip.danger:hover { background: rgba(239,68,68,0.4); }

        /* Indicatore sync cloud */
        #syncStatus {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            white-space: nowrap;
            flex-shrink: 0;
        }
        #syncStatus.ok   { color: #34d399; }
        #syncStatus.err  { color: #f87171; }
        #syncStatus.sync { color: #fbbf24; }

        /* ========== LAYOUT PRINCIPALE ========== */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #map { flex: 1; min-height: 0; }

        /* ========== PANNELLO LATERALE / INFERIORE ========== */
        .control-panel {
            background: white;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            max-height: 42vh;
            flex-shrink: 0;
        }
        .panel-header {
            padding: 14px 16px 8px;
            border-bottom: 1px solid #e2e8f0;
        }
        .panel-header h2 { font-size: 17px; font-weight: 700; }
        .panel-header p  { font-size: 13px; color: #3b82f6; font-weight: 600; margin-top: 2px; }

        .steps-container { flex: 1; overflow-y: auto; padding: 8px 12px; }

        .step-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 10px;
            margin-bottom: 3px;
            opacity: 0.4;
            font-size: 14px;
            transition: opacity 0.15s, background 0.15s;
            cursor: default;
        }
        .step-row.active {
            opacity: 1;
            background: #eef4ff;
            border-left: 4px solid #3b82f6;
            font-weight: 700;
        }
        .step-row.completed { opacity: 0.65; }

        .step-number {
            width: 24px; height: 24px;
            background: #cbd5e1;
            color: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold;
            flex-shrink: 0;
        }
        .step-row.active .step-number { background: #3b82f6; }
        .hidden-mode .step-name {
            background: #e2e8f0;
            color: transparent;
            border-radius: 5px;
            user-select: none;
        }

        .panel-footer {
            padding: 8px 12px;
            border-top: 1px solid #e2e8f0;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            flex-shrink: 0;
        }
        .btn-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            min-height: 46px;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.15s, filter 0.15s;
        }
        .btn:hover:not(:disabled) { filter: brightness(1.08); }
        .btn-secondary { background: #eef2f6; color: #1e293b; }
        .btn-primary   { background: #3b82f6; color: white; }
        .btn-street    { background: #f59e0b; color: #1e293b; }
        .btn:disabled  { opacity: 0.32; cursor: not-allowed; }

        /* ========== MODALI ========== */
        .modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            z-index: 3000;
            visibility: hidden; opacity: 0;
            transition: opacity 0.2s, visibility 0.2s;
        }
        .modal.open { visibility: visible; opacity: 1; }

        .modal-box {
            background: white;
            padding: 20px;
            border-radius: 20px;
            width: 93%;
            height: 88vh;
            display: flex; flex-direction: column; gap: 10px;
            overflow: hidden;
        }
        .modal-box h3 { font-size: 17px; font-weight: 700; flex-shrink: 0; }
        .modal-box input, .modal-box textarea {
            width: 100%; padding: 11px 14px; font-size: 15px;
            border: 1.5px solid #e2e8f0; border-radius: 10px; background: #f9fafb;
            outline: none; transition: border-color 0.15s;
        }
        .modal-box input:focus, .modal-box textarea:focus { border-color: #3b82f6; }
        .add-step-box { display: flex; gap: 8px; flex-shrink: 0; }
        .add-step-box input { flex: 1; }

        .step-list-modal {
            flex: 1; overflow-y: auto;
            border-top: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
            padding: 6px 0;
        }
        .step-item-modal {
            display: flex; align-items: center; justify-content: space-between;
            padding: 7px 10px; border-radius: 8px; background: #f8fafc;
            margin-bottom: 3px; font-size: 14px;
        }
        .step-item-modal button {
            background: none; border: none; cursor: pointer;
            color: #94a3b8; font-size: 16px; padding: 2px 6px;
            border-radius: 6px; transition: background 0.15s, color 0.15s;
        }
        .step-item-modal button:hover { background: #fee2e2; color: #ef4444; }

        #modalMap {
            height: 220px; min-height: 160px; flex-shrink: 0;
            border-radius: 12px; border: 1px solid #e2e8f0;
        }

        .modal-buttons { display: flex; gap: 8px; flex-shrink: 0; }
        .btn-save  { background: #10b981; color: white; padding: 12px; border-radius: 12px; font-weight: 700; flex: 1; border: none; cursor: pointer; font-size: 15px; }
        .btn-close { background: #eef2f6; color: #1e293b; padding: 12px; border-radius: 12px; font-weight: 700; flex: 1; border: none; cursor: pointer; font-size: 15px; }
        .btn-save:hover  { background: #059669; }
        .btn-close:hover { background: #e2e8f0; }

        /* ========== TOAST ========== */
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #10b981; color: white; padding: 11px 22px;
            border-radius: 24px; font-size: 15px; font-weight: 700;
            z-index: 4000; display: none; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }

        /* ========== LOADING OVERLAY ========== */
        #loadingOverlay {
            position: fixed; inset: 0;
            background: #0b1e33;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px; z-index: 9999;
            color: white; font-size: 18px; font-weight: 600;
        }
        #loadingOverlay .spinner {
            width: 44px; height: 44px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ========== DESKTOP (≥ 900px) ========== */
        @media (min-width: 900px) {
            header { padding: 12px 24px; }

            /* Nascondi header-row mobile, mostra struttura desktop */
            .header-row   { display: none; }
            .header-search { display: flex; }
            .header-chips  { display: flex; }

            /* Sidebar a destra */
            .main-container { flex-direction: row; }

            #map { flex: 1; border-radius: 0; }

            .control-panel {
                width: 420px;
                max-height: none;
                border-radius: 0;
                border-left: 1px solid #e2e8f0;
                box-shadow: -4px 0 20px rgba(0,0,0,0.06);
            }

            .panel-header { padding: 18px 20px 12px; }
            .panel-header h2 { font-size: 19px; }
            .panel-header p  { font-size: 14px; }

            .steps-container { padding: 10px 16px; }
            .step-row { font-size: 15px; padding: 10px 14px; }

            .panel-footer { padding: 12px 16px 16px; }
            .btn { font-size: 16px; min-height: 50px; }

            /* Modale più grande su desktop */
            .modal-box { width: 700px; height: 82vh; padding: 28px; gap: 14px; }
            #modalMap { height: 280px; }
        }

        /* ========== DESKTOP LARGE (≥ 1280px) ========== */
        @media (min-width: 1280px) {
            .control-panel { width: 480px; }
            .modal-box { width: 780px; }
        }
    </style>
</head>
<body>
    <!-- Loading overlay -->
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <span>Caricamento percorsi...</span>
    </div>

    <header>
        <!-- MOBILE: riga singola scrollabile -->
        <div class="header-row" style="position:relative;">
            <input type="text" id="searchBar" placeholder="🔍 Cerca percorso..." autocomplete="off" oninput="showSuggestions()">
            <ul class="suggestions" id="suggestionsList"></ul>
            <span class="chip active" id="modeStudio" onclick="setMode('studio')">Studio</span>
            <span class="chip" id="modeEsame" onclick="setMode('esame')">Cieco</span>
            <span class="chip" id="modeQuiz" onclick="setMode('quiz')">Quiz</span>
            <span class="chip" onclick="openAddModal()">➕</span>
            <span class="chip" onclick="selectRandomRoute()">🔀</span>
            <span class="chip" onclick="openRoutesManager()">📋</span>
            <span class="chip danger" onclick="resetData()">🔄</span>
            <span class="chip" onclick="exportData()">📤</span>
            <span class="chip" onclick="importData()">📥</span>
            <span id="syncStatusMobile" class="chip" style="font-size:12px; padding:6px 10px;">☁️</span>
        </div>

        <!-- DESKTOP: search + sync in prima riga, chips in seconda -->
        <div class="header-search" style="position:relative;">
            <input type="text" id="searchBarDesktop" placeholder="🔍 Cerca percorso..." autocomplete="off" oninput="showSuggestionsDesktop()">
            <ul class="suggestions" id="suggestionsListDesktop"></ul>
            <span id="syncStatus" class="ok">☁️ Online</span>
        </div>
        <div class="header-chips">
            <span class="chip active" id="modeStudioD" onclick="setMode('studio')">📖 Studio</span>
            <span class="chip" id="modeEsameD" onclick="setMode('esame')">🙈 Cieco</span>
            <span class="chip" id="modeQuizD" onclick="setMode('quiz')">❓ Quiz</span>
            <span class="chip" onclick="openAddModal()">➕ Nuovo</span>
            <span class="chip" onclick="selectRandomRoute()">🔀 Random</span>
            <span class="chip" onclick="openRoutesManager()">📋 Percorsi</span>
            <span class="chip" onclick="exportData()">📤 Export</span>
            <span class="chip" onclick="importData()">📥 Import</span>
            <span class="chip danger" onclick="resetData()">🔄 Reset</span>
        </div>
    </header>

    <div class="main-container">
        <div id="map"></div>
        <div class="control-panel">
            <div class="panel-header">
                <h2 id="currentRouteTitle">Prontuario NCC</h2>
                <p id="routeProgress">Seleziona un percorso</p>
            </div>
            <div class="steps-container" id="stepsList"></div>
            <div class="panel-footer">
                <div id="normalFooter">
                    <div class="btn-row">
                        <button class="btn btn-secondary" id="btnPrev" onclick="prevStep()" disabled>◀</button>
                        <button class="btn btn-street" id="btnStreet" onclick="openStreetView()" disabled>👁️</button>
                        <button class="btn btn-primary" id="btnNext" onclick="nextStep()" disabled>▶</button>
                    </div>
                    <button class="btn btn-secondary" id="btnReveal" onclick="revealStep()" style="display:none;">👁️ Scopri via</button>
                </div>
                <div id="quizFooter" style="display:none;">
                    <div style="display:flex; gap:8px; margin-bottom:8px;">
                        <input id="quizAnswer" placeholder="Scrivi la via..." style="flex:1; padding:12px; border-radius:12px; border:1px solid #e2e8f0;">
                        <button class="btn btn-primary" onclick="checkQuiz()" style="flex:0;">➡️</button>
                    </div>
                    <div id="quizFeedback" style="font-weight:bold; margin-bottom:8px;"></div>
                    <div class="btn-row">
                        <button class="btn btn-secondary" onclick="skipQuiz()">⏭️ Salta</button>
                        <button class="btn btn-secondary" onclick="revealStep()">👁️ Mostra</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modale Nuovo/Modifica -->
    <div class="modal" id="routeModal">
        <div class="modal-box">
            <h3 id="modalTitle">➕ Nuovo Percorso</h3>
            <input type="text" id="newRouteTitle" placeholder="TITOLO (es. LINATE - OSPEDALE)">
            <div class="add-step-box">
                <input type="text" id="stepInput" placeholder="Via..." onkeydown="if(event.key==='Enter')addStepFromInput()">
                <button class="btn btn-primary" onclick="addStepFromInput()" style="flex:0;">➕</button>
                <button class="btn btn-secondary" onclick="addMultipleSteps()" style="flex:0;">📋</button>
            </div>
            <textarea id="multipleStepsInput" placeholder="Incolla elenco vie (una per riga)" rows="3" style="display:none;"></textarea>
            <div class="step-list-modal" id="modalStepList"></div>
            <div id="modalMap"></div>
            <div class="modal-buttons">
                <button class="btn-close" onclick="closeAddModal()">Annulla</button>
                <button class="btn-save" onclick="saveRoute()">Salva</button>
            </div>
        </div>
    </div>

    <!-- Modale Gestione Percorsi -->
    <div class="modal" id="routesManagerModal">
        <div class="modal-box" style="height:auto; max-height:80vh;">
            <h3>📋 Percorsi salvati</h3>
            <div id="routesManagerList" style="overflow-y:auto;"></div>
            <button class="btn-close" onclick="closeRoutesManager()">Chiudi</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylinedecorator.js"></script>
    <script>
        // ==================== FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBtVu_bZruWdB3nQz0MhrNmCE7lMonoGd4",
            authDomain: "ncc-milano-2dbd0.firebaseapp.com",
            databaseURL: "https://ncc-milano-2dbd0-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "ncc-milano-2dbd0",
            storageBucket: "ncc-milano-2dbd0.firebasestorage.app",
            messagingSenderId: "511775426532",
            appId: "1:511775426532:web:785259ec4e187e42aba9f1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const cloudRef = db.ref('prontuario');

        // ==================== DATI ====================
        const DEFAULT = [{
            title: "CERCHIA DEI BASTIONI",
            steps: ["P.ZA 24 MAGGIO","V.LE GIAN GALEAZZO","P.LE DI PORTA LODOVICA","V.LE BEATRICE D'ESTE","L.GO ISABELLA D'ARAGONA","V.LE BEATRICE D'ESTE","V.LE FILIPPETTI","P.LE MEDAGLIE D'ORO","P.ZA 25 APRILE","VIALE CRISPI","BASTIONI DI PORTA VOLTA","P.LE BIANCAMANO","P.LE LEGA LOMBARDA","V.LE ELVEZIA","VIA MELZI D'ERIL","VIA CANOVA","VIALE CALDARA","VIALE REGINA MARGHERITA","V.LE MILTON","V.LE MOLIERE","P.ZA 5 GIORNATE","V.LE BIANCA MARIA","P.ZA DEL TRICOLORE","V.LE MAJNO","VIA CURIE","VIA 20 SETTEMBRE","P.ZA CONCILIAZIONE","VIA ENRICO TOTI","P.ZA OBERDAN","P.LE BARACCA","BASTIONI DI PORTA VENEZIA","VIALE CITTA' DI FIUME","P.ZA DELLA REPUBBLICA","VIALE MONTESANTO","P.LE PRINCIPESSA CLOTILDE","V.LE DI PORTA VERCELLINA","P.LE AQUILEIA","V.LE PAPINIANO","P.ZA SANT'AGOSTINO","V.LE PAPINIANO","BASTIONI DI PORTA NUOVA","P.LE GENERAL CANTORE","V.LE GABRIELE D'ANNUNZIO","P.ZA 24 MAGGIO"]
        }];

        // Cache locale (fallback offline)
        let routes    = JSON.parse(localStorage.getItem('routes'))    || DEFAULT;
        let coords    = JSON.parse(localStorage.getItem('coords'))    || {};
        let errors    = JSON.parse(localStorage.getItem('errors'))    || {};
        let quizStats = JSON.parse(localStorage.getItem('quizStats')) || {};

        let appReady = false; // diventa true dopo il primo caricamento da Firebase

        // Indicatore stato sync
        function setSyncStatus(state, label) {
            const el  = document.getElementById('syncStatus');
            const el2 = document.getElementById('syncStatusMobile');
            if (el)  { el.className  = state; el.textContent  = label; }
            if (el2) { el2.textContent = label; }
        }

        // ==================== CLOUD COME SORGENTE PRINCIPALE ====================
        // Salva TUTTO su Firebase (routes, coords, errors, quizStats)
        function saveToCloud() {
            setSyncStatus('sync', '🔄 Salvo...');
            cloudRef.set({ routes, coords, errors, quizStats, ts: Date.now() })
                .then(() => {
                    setSyncStatus('ok', '☁️ Salvato');
                    // Aggiorna anche la cache locale
                    localStorage.setItem('routes',    JSON.stringify(routes));
                    localStorage.setItem('coords',    JSON.stringify(coords));
                    localStorage.setItem('errors',    JSON.stringify(errors));
                    localStorage.setItem('quizStats', JSON.stringify(quizStats));
                })
                .catch(e => {
                    console.error('Errore salvataggio cloud:', e);
                    setSyncStatus('err', '❌ Offline');
                    // Salva comunque in locale come fallback
                    localStorage.setItem('routes',    JSON.stringify(routes));
                    localStorage.setItem('coords',    JSON.stringify(coords));
                    localStorage.setItem('errors',    JSON.stringify(errors));
                    localStorage.setItem('quizStats', JSON.stringify(quizStats));
                });
        }

        // Ascolta i cambiamenti in tempo reale da Firebase (sync multi-dispositivo)
        cloudRef.on('value', snap => {
            const data = snap.val();

            if (!appReady) {
                // Primo caricamento: Firebase è la sorgente di verità
                if (data) {
                    if (data.routes)    routes    = data.routes;
                    if (data.coords)    coords    = data.coords;
                    if (data.errors)    errors    = data.errors;
                    if (data.quizStats) quizStats = data.quizStats;
                } else {
                    // Nessun dato su cloud: carica il DEFAULT e salvalo subito
                    routes = JSON.parse(localStorage.getItem('routes')) || DEFAULT;
                    coords = JSON.parse(localStorage.getItem('coords')) || {};
                    saveToCloud();
                }
                // Aggiorna cache locale
                localStorage.setItem('routes',    JSON.stringify(routes));
                localStorage.setItem('coords',    JSON.stringify(coords));
                localStorage.setItem('errors',    JSON.stringify(errors));
                localStorage.setItem('quizStats', JSON.stringify(quizStats));

                // Avvia l'app
                appReady = true;
                document.getElementById('loadingOverlay').style.display = 'none';
                initMap();
                if (routes.length) selectRoute(routes[0]);
                setSyncStatus('ok', '☁️ Online');
                return;
            }

            // Aggiornamenti successivi: aggiorna solo se i dati sono cambiati
            if (!data) return;
            let changed = false;

            if (data.routes && JSON.stringify(data.routes) !== JSON.stringify(routes)) {
                routes = data.routes;
                localStorage.setItem('routes', JSON.stringify(routes));
                changed = true;
            }
            if (data.coords && JSON.stringify(data.coords) !== JSON.stringify(coords)) {
                coords = data.coords;
                localStorage.setItem('coords', JSON.stringify(coords));
                changed = true;
            }
            if (data.errors) {
                errors = data.errors;
                localStorage.setItem('errors', JSON.stringify(errors));
            }
            if (data.quizStats) {
                quizStats = data.quizStats;
                localStorage.setItem('quizStats', JSON.stringify(quizStats));
            }

            if (changed && currentRoute) {
                const key = `${currentRoute.title}_${currentStep}`;
                if (coords[key] && marker) {
                    marker.setLatLng([coords[key].lat, coords[key].lon]);
                }
                updateLines();
                const updated = routes.find(r => r.title === currentRoute.title);
                if (updated && JSON.stringify(updated.steps) !== JSON.stringify(currentRoute.steps)) {
                    currentRoute = updated;
                    renderSteps();
                }
            }
            setSyncStatus('ok', '☁️ Online');
        }, err => {
            console.error('Firebase error:', err);
            setSyncStatus('err', '❌ Offline');
            // Se non è ancora pronto, avvia con la cache locale
            if (!appReady) {
                appReady = true;
                document.getElementById('loadingOverlay').style.display = 'none';
                initMap();
                if (routes.length) selectRoute(routes[0]);
            }
        });

        // ==================== UTILITA' ====================
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // ==================== MAPPA ====================
        let map, modalMap;
        let currentRoute = null, currentStep = 0;
        let marker = null;
        let doneLine = null, doneDecorator = null, nextLine = null;
        let mode = 'studio';
        let modalSteps = [], editingTitle = null, modalMarkers = [];

        // Prefisso temporaneo univoco per nuovi percorsi nella modal
        let tempSessionKey = '__TEMP__';

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([45.4642, 9.1900], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            L.control.zoom({ position: 'topright' }).addTo(map);
        }

        function selectRoute(route) {
            currentRoute = route; currentStep = 0;
            if (marker) { map.removeLayer(marker); marker = null; }
            clearLines();
            document.getElementById('currentRouteTitle').textContent = route.title;
            // Aggiorna entrambe le barre di ricerca
            const sb = document.getElementById('searchBar');
            const sbd = document.getElementById('searchBarDesktop');
            if (sb)  sb.value  = route.title;
            if (sbd) sbd.value = route.title;
            renderSteps(); updateUI(); goToStep();
        }

        function renderSteps() {
            const c = document.getElementById('stepsList'); c.innerHTML = '';
            currentRoute.steps.forEach((s, i) => {
                const d = document.createElement('div');
                d.className = `step-row ${i===currentStep?'active':(i<currentStep?'completed':'')} ${mode!=='studio'?'hidden-mode':''}`;
                d.innerHTML = `<div class="step-number">${i+1}</div><div class="step-name">${s}</div>`;
                c.appendChild(d);
            });
            // Scroll automatico al passo attivo
            const activeRow = document.querySelector('.step-row.active');
            if (activeRow) activeRow.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }

        function nextStep() {
            if (currentStep < currentRoute.steps.length-1) {
                currentStep++; renderSteps(); updateUI(); goToStep();
                if (currentStep === currentRoute.steps.length-1 && mode !== 'quiz') {
                    errors[currentRoute.title] = errors[currentRoute.title] || {};
                    errors[currentRoute.title].completed = true;
                    localStorage.setItem('errors', JSON.stringify(errors));
                    saveToCloud();
                    setTimeout(() => { alert('Percorso completato!'); selectRandomRoute(); }, 500);
                }
            }
        }
        function prevStep() {
            if (currentStep > 0) { currentStep--; renderSteps(); updateUI(); goToStep(); }
        }
        function revealStep() {
            const rows = document.querySelectorAll('.step-row');
            if (rows[currentStep]) rows[currentStep].classList.add('revealed');
            document.getElementById('quizFeedback').textContent = currentRoute.steps[currentStep];
        }
        function updateUI() {
            document.getElementById('routeProgress').textContent = `Via ${currentStep+1} di ${currentRoute.steps.length}`;
            document.getElementById('btnPrev').disabled = currentStep === 0;
            document.getElementById('btnNext').disabled = currentStep === currentRoute.steps.length-1;
            document.getElementById('btnStreet').disabled = !marker;
            document.getElementById('btnReveal').style.display = mode === 'esame' ? 'block' : 'none';
            document.getElementById('normalFooter').style.display = mode === 'quiz' ? 'none' : 'block';
            document.getElementById('quizFooter').style.display = mode === 'quiz' ? 'block' : 'none';
        }

        // FIX 1: goToStep usa SOLO le coordinate salvate.
        // Il marker è NON draggable: la posizione viene fissata al salvataggio.
        function goToStep() {
            if (!currentRoute) return;
            const step = currentRoute.steps[currentStep];
            const key = `${currentRoute.title}_${currentStep}`;

            if (coords[key]) {
                // Coordinate salvate: posiziona il marker FISSO lì
                placeMarker(coords[key].lat, coords[key].lon, step);
                map.setView([coords[key].lat, coords[key].lon], map.getZoom());
            } else {
                // Nessuna coordinata salvata per questo step: non spostare il marker
                // (lascialo dov'è o rimuovilo se è il primo step senza coords)
                if (marker) {
                    marker.getPopup().setContent(`<b>${step}</b> <br><small style="color:#ef4444">⚠️ Posizione non salvata</small>`);
                    marker.openPopup();
                }
                // Non creare un marker a caso al centro mappa
            }
        }

        // FIX 2: placeMarker sulla mappa principale NON è draggable
        function placeMarker(lat, lon, name) {
            if (marker) {
                marker.setLatLng([lat, lon]);
                marker.getPopup().setContent(`<b>${name}</b>`);
            } else {
                // Marker NON draggable nella vista principale
                marker = L.marker([lat, lon], { draggable: false })
                    .addTo(map)
                    .bindPopup(`<b>${name}</b>`);
            }
            marker.openPopup();
            updateLines();
            document.getElementById('btnStreet').disabled = false;
        }

        function updateLines() {
            if (doneDecorator) { map.removeLayer(doneDecorator); doneDecorator = null; }
            if (doneLine) { map.removeLayer(doneLine); doneLine = null; }
            if (nextLine) { map.removeLayer(nextLine); nextLine = null; }
            if (!currentRoute) return;

            const done = [], rem = [];
            for (let i = 0; i <= currentStep; i++) {
                const k = `${currentRoute.title}_${i}`;
                if (coords[k]) done.push([coords[k].lat, coords[k].lon]);
            }
            for (let i = currentStep; i < currentRoute.steps.length; i++) {
                const k = `${currentRoute.title}_${i}`;
                if (coords[k]) rem.push([coords[k].lat, coords[k].lon]);
            }

            if (done.length > 1) {
                doneLine = L.polyline(done, { color: '#3b82f6', weight: 5, opacity: 0.9 }).addTo(map);
                doneDecorator = L.polylineDecorator(doneLine, {
                    patterns: [{ offset: '5%', repeat: '100px', symbol: L.Symbol.arrowHead({ pixelSize: 16, pathOptions: { color: '#1e40af', weight: 3 } }) }]
                }).addTo(map);
            }
            if (rem.length > 1) {
                nextLine = L.polyline(rem, { color: '#94a3b8', weight: 3, opacity: 0.5, dashArray: '8 8' }).addTo(map);
            }
        }

        function clearLines() {
            if (doneDecorator) { map.removeLayer(doneDecorator); doneDecorator = null; }
            if (doneLine) { map.removeLayer(doneLine); doneLine = null; }
            if (nextLine) { map.removeLayer(nextLine); nextLine = null; }
        }

        function openStreetView() {
            if (marker) {
                const p = marker.getLatLng();
                window.open(`https://www.google.com/maps?layer=c&cbll=${p.lat},${p.lng}`, '_blank');
            }
        }

        // ==================== MODALITÀ ====================
        function setMode(m) {
            mode = m;
            // Aggiorna chip mobile
            ['modeStudio','modeEsame','modeQuiz'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.className = 'chip';
            });
            const mEl = document.getElementById('mode'+m.charAt(0).toUpperCase()+m.slice(1));
            if (mEl) mEl.classList.add('active');
            // Aggiorna chip desktop
            ['modeStudioD','modeEsameD','modeQuizD'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.className = 'chip';
            });
            const mKey = { studio: 'modeStudioD', esame: 'modeEsameD', quiz: 'modeQuizD' }[m];
            const dEl = document.getElementById(mKey);
            if (dEl) dEl.classList.add('active');

            if (currentRoute) renderSteps();
            updateUI();
            if (m === 'quiz') document.getElementById('quizAnswer').focus();
        }

        // Ricerca desktop (barra header desktop)
        function showSuggestionsDesktop() {
            const q  = document.getElementById('searchBarDesktop').value.toUpperCase();
            const ul = document.getElementById('suggestionsListDesktop');
            ul.innerHTML = '';
            if (!q) { ul.style.display = 'none'; return; }
            const filtered = routes.filter(r => r.title.includes(q));
            if (filtered.length) {
                filtered.forEach(r => {
                    const li = document.createElement('li'); li.textContent = r.title;
                    li.onclick = () => {
                        selectRoute(r);
                        ul.style.display = 'none';
                        document.getElementById('searchBarDesktop').value = r.title;
                    };
                    ul.appendChild(li);
                });
                ul.style.display = 'block';
            } else ul.style.display = 'none';
        }

        // ==================== QUIZ ====================
        function checkQuiz() {
            const ans = document.getElementById('quizAnswer').value.trim().toUpperCase();
            const correct = currentRoute.steps[currentStep].toUpperCase();
            const fb = document.getElementById('quizFeedback');
            if (!quizStats[currentRoute.title]) quizStats[currentRoute.title] = { correct: 0, total: 0 };
            quizStats[currentRoute.title].total++;
            if (ans === correct) {
                fb.textContent = '✅ Corretto!'; fb.style.color = 'green';
                quizStats[currentRoute.title].correct++;
                localStorage.setItem('quizStats', JSON.stringify(quizStats)); saveToCloud();
                setTimeout(() => { if (currentStep < currentRoute.steps.length-1) nextStep(); else alert('Completato!'); }, 600);
            } else {
                fb.textContent = `❌ La via è: ${correct}`; fb.style.color = 'red';
                localStorage.setItem('quizStats', JSON.stringify(quizStats)); saveToCloud();
            }
        }
        function skipQuiz() {
            const fb = document.getElementById('quizFeedback');
            fb.textContent = `Risposta: ${currentRoute.steps[currentStep]}`; fb.style.color = 'orange';
            if (!quizStats[currentRoute.title]) quizStats[currentRoute.title] = { correct: 0, total: 0 };
            quizStats[currentRoute.title].total++;
            localStorage.setItem('quizStats', JSON.stringify(quizStats)); saveToCloud();
            setTimeout(() => { if (currentStep < currentRoute.steps.length-1) nextStep(); else alert('Completato!'); }, 600);
        }

        // ==================== MODALE AGGIUNTA ====================
        // FIX 3: nella modal i marker SONO draggable e le coords vengono salvate
        // con la chiave corretta (titolo reale, non TEMP).
        // La chiave temporanea usa un prefisso univoco che viene rinominato al salvataggio.

        function openAddModal(editTitle = null) {
            document.getElementById('routeModal').classList.add('open');
            modalSteps = []; editingTitle = editTitle;
            // Genera una chiave temporanea unica per questa sessione di creazione
            tempSessionKey = editTitle || ('__NEW__' + Date.now());

            if (editTitle) {
                const route = routes.find(r => r.title === editTitle);
                if (route) {
                    modalSteps = [...route.steps];
                    document.getElementById('newRouteTitle').value = route.title;
                    document.getElementById('modalTitle').textContent = '✏️ Modifica';
                }
            } else {
                document.getElementById('newRouteTitle').value = '';
                document.getElementById('modalTitle').textContent = '➕ Nuovo';
            }
            renderModalSteps(); clearModalMarkers();
            if (!modalMap) {
                modalMap = L.map('modalMap', { zoomControl: false }).setView([45.4642, 9.1900], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(modalMap);
            } else {
                setTimeout(() => modalMap.invalidateSize(), 200);
            }

            // Se stiamo modificando, carica i marker esistenti
            if (editTitle) {
                modalSteps.forEach((s, idx) => loadModalMarker(s, idx));
            }
        }

        function closeAddModal() {
            // Pulisci le coordinate temporanee non salvate
            if (!editingTitle) {
                Object.keys(coords).forEach(k => {
                    if (k.startsWith(tempSessionKey + '_')) delete coords[k];
                });
                localStorage.setItem('coords', JSON.stringify(coords));
            }
            document.getElementById('routeModal').classList.remove('open');
        }

        function addStepFromInput() {
            const v = document.getElementById('stepInput').value.trim().toUpperCase();
            if (!v) return;
            const idx = modalSteps.length;
            modalSteps.push(v);
            document.getElementById('stepInput').value = '';
            renderModalSteps();
            fetchModalCoords(v, idx);
        }

        function addMultipleSteps() {
            const text = document.getElementById('multipleStepsInput').value;
            const lines = text.split('\n').map(l => l.trim().toUpperCase()).filter(l => l);
            if (!lines.length) return;
            const startIdx = modalSteps.length;
            lines.forEach((l, i) => {
                modalSteps.push(l);
                fetchModalCoords(l, startIdx + i);
            });
            document.getElementById('multipleStepsInput').value = '';
            renderModalSteps();
        }

        // Carica marker per step già esistenti (modifica percorso)
        function loadModalMarker(step, idx) {
            const key = `${editingTitle}_${idx}`;
            if (coords[key]) {
                createModalMarker(coords[key].lat, coords[key].lon, step, idx);
            }
        }

        // FIX 4: fetchModalCoords usa Nominatim solo se non ci sono già coords salvate.
        // Cerca prima con la chiave temporanea, poi con il titolo reale se modifica.
        function fetchModalCoords(step, idx) {
            // Per modifica: usa le coords esistenti con il titolo reale
            if (editingTitle) {
                const existingKey = `${editingTitle}_${idx}`;
                if (coords[existingKey]) {
                    createModalMarker(coords[existingKey].lat, coords[existingKey].lon, step, idx);
                    return;
                }
            }

            // Per nuovo percorso: usa la chiave temporanea
            const tempKey = `${tempSessionKey}_${idx}`;
            if (coords[tempKey]) {
                createModalMarker(coords[tempKey].lat, coords[tempKey].lon, step, idx);
                return;
            }

            // Nessuna coordinata salvata: cerca online tramite Nominatim
            // Punto di partenza: ultimo marker posizionato o centro Milano
            let fallbackLat = 45.4642, fallbackLng = 9.1900;
            for (let i = idx - 1; i >= 0; i--) {
                const prevKey = editingTitle ? `${editingTitle}_${i}` : `${tempSessionKey}_${i}`;
                if (coords[prevKey]) {
                    fallbackLat = coords[prevKey].lat;
                    fallbackLng = coords[prevKey].lon;
                    break;
                }
            }

            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(step + ', Milano')}`)
                .then(r => r.json())
                .then(d => {
                    if (d && d.length) {
                        const lat = parseFloat(d[0].lat);
                        const lon = parseFloat(d[0].lon);
                        const dist = getDistance(fallbackLat, fallbackLng, lat, lon);
                        // Accetta solo se entro 5km da Milano/punto precedente
                        if (dist <= 5) {
                            createModalMarker(lat, lon, step, idx);
                        } else {
                            createModalMarker(fallbackLat, fallbackLng, step, idx);
                        }
                    } else {
                        createModalMarker(fallbackLat, fallbackLng, step, idx);
                    }
                })
                .catch(() => {
                    createModalMarker(fallbackLat, fallbackLng, step, idx);
                });
        }

        // FIX 5: createModalMarker salva con la chiave corretta e il marker è DRAGGABLE
        // (solo nella modal, per permettere aggiustamenti prima del salvataggio)
        function createModalMarker(lat, lon, step, idx) {
            // Determina la chiave da usare
            const key = editingTitle ? `${editingTitle}_${idx}` : `${tempSessionKey}_${idx}`;

            // Salva subito la posizione (temporanea o definitiva se modifica)
            coords[key] = { lat, lon };
            localStorage.setItem('coords', JSON.stringify(coords));

            const m = L.marker([lat, lon], { draggable: true })
                .addTo(modalMap)
                .bindTooltip(`${idx+1}. ${step}`, { permanent: true, direction: 'top' });

            // FIX: aggiorna le coords ogni volta che il marker viene spostato
            m.on('dragend', () => {
                const p = m.getLatLng();
                coords[key] = { lat: p.lat, lon: p.lng };
                localStorage.setItem('coords', JSON.stringify(coords));
                // Centra la mappa sul marker spostato
                modalMap.panTo([p.lat, p.lng]);
            });

            modalMarkers.push(m);

            // Centra la mappa sul nuovo marker
            modalMap.setView([lat, lon], 15);
        }

        function clearModalMarkers() {
            modalMarkers.forEach(m => { if (modalMap) modalMap.removeLayer(m); });
            modalMarkers = [];
        }

        function renderModalSteps() {
            const c = document.getElementById('modalStepList'); c.innerHTML = '';
            modalSteps.forEach((s, i) => {
                const d = document.createElement('div');
                d.className = 'step-item-modal';
                d.innerHTML = `<span>${i+1}. ${s}</span><button onclick="removeModalStep(${i})">✕</button>`;
                c.appendChild(d);
            });
        }

        window.removeModalStep = function(i) {
            modalSteps.splice(i, 1);
            renderModalSteps();
            clearModalMarkers();
            // Riposiziona i marker rimanenti (potrebbero aver cambiato indice)
            // Prima rimuovi le coord con indici sbagliati, poi riposiziona
            modalSteps.forEach((s, idx) => {
                if (editingTitle) {
                    // Per la modifica, le coords sono già salvate con gli indici originali
                    // (non modifichiamo qui per non perdere dati — lo faremo al salvataggio)
                    loadModalMarker(s, idx);
                } else {
                    const key = `${tempSessionKey}_${idx}`;
                    if (coords[key]) {
                        createModalMarker(coords[key].lat, coords[key].lon, s, idx);
                    } else {
                        fetchModalCoords(s, idx);
                    }
                }
            });
        };

        // FIX 6: saveRoute trasferisce correttamente le coordinate temporanee
        function saveRoute() {
            const title = document.getElementById('newRouteTitle').value.trim().toUpperCase();
            if (!title || !modalSteps.length) return alert("Titolo e vie obbligatori");

            if (editingTitle) {
                const idx = routes.findIndex(r => r.title === editingTitle);
                if (idx !== -1) {
                    routes[idx] = { title, steps: modalSteps };
                    // Se il titolo è cambiato, rinomina le chiavi coords
                    if (editingTitle !== title) {
                        Object.keys(coords).forEach(k => {
                            if (k.startsWith(editingTitle + '_')) {
                                const newKey = title + '_' + k.slice(editingTitle.length + 1);
                                coords[newKey] = coords[k];
                                delete coords[k];
                            }
                        });
                    }
                }
            } else {
                // Nuovo percorso: trasferisci le coordinate dalla chiave temporanea al titolo definitivo
                for (let i = 0; i < modalSteps.length; i++) {
                    const tempKey = `${tempSessionKey}_${i}`;
                    const finalKey = `${title}_${i}`;
                    if (coords[tempKey]) {
                        coords[finalKey] = coords[tempKey];
                        delete coords[tempKey];
                    }
                }
                routes.push({ title, steps: modalSteps });
            }

            localStorage.setItem('routes', JSON.stringify(routes));
            localStorage.setItem('coords', JSON.stringify(coords));
            saveToCloud();
            document.getElementById('routeModal').classList.remove('open'); // chiudi senza cancellare coords
            alert('Percorso salvato!');
        }

        // ==================== GESTIONE PERCORSI ====================
        function openRoutesManager() {
            document.getElementById('routesManagerModal').classList.add('open');
            const list = document.getElementById('routesManagerList'); list.innerHTML = '';
            routes.forEach(r => {
                const d = document.createElement('div');
                d.style.cssText = 'display:flex; justify-content:space-between; padding:8px; background:#f8fafc; border-radius:8px; margin-bottom:4px;';
                d.innerHTML = `<span>${r.title} (${r.steps.length})</span>
                    <span>
                        <button onclick="openAddModal('${r.title}')">✏️</button>
                        <button onclick="deleteRoute('${r.title}')">🗑️</button>
                    </span>`;
                list.appendChild(d);
            });
        }
        function closeRoutesManager() { document.getElementById('routesManagerModal').classList.remove('open'); }
        window.deleteRoute = function(title) {
            if (!confirm('Eliminare?')) return;
            routes = routes.filter(r => r.title !== title);
            Object.keys(coords).forEach(k => { if (k.startsWith(title+'_')) delete coords[k]; });
            localStorage.setItem('routes', JSON.stringify(routes));
            localStorage.setItem('coords', JSON.stringify(coords));
            saveToCloud();
            if (currentRoute && currentRoute.title === title) {
                currentRoute = null;
                if (marker) { map.removeLayer(marker); marker = null; }
                clearLines();
                document.getElementById('currentRouteTitle').textContent = 'Prontuario NCC';
                document.getElementById('stepsList').innerHTML = '';
            }
            closeRoutesManager();
        };

        // ==================== RICERCA E RANDOM ====================
        function showSuggestions() {
            const q = document.getElementById('searchBar').value.toUpperCase();
            const ul = document.getElementById('suggestionsList'); ul.innerHTML = '';
            if (!q) { ul.style.display = 'none'; return; }
            const filtered = routes.filter(r => r.title.includes(q));
            if (filtered.length) {
                filtered.forEach(r => {
                    const li = document.createElement('li'); li.textContent = r.title;
                    li.onclick = () => { selectRoute(r); ul.style.display = 'none'; };
                    ul.appendChild(li);
                });
                ul.style.display = 'block';
            } else ul.style.display = 'none';
        }

        function selectRandomRoute() {
            if (routes.length) selectRoute(routes[Math.floor(Math.random() * routes.length)]);
        }

        // ==================== UTILITY ====================
        function resetData() { if (confirm('Cancellare tutti i dati?')) { localStorage.clear(); location.reload(); } }
        function exportData() {
            const blob = new Blob([JSON.stringify({routes,coords,errors,quizStats})], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = 'prontuario_backup.json'; a.click();
        }
        function importData() {
            const input = document.createElement('input'); input.type = 'file';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = () => {
                    const data = JSON.parse(reader.result);
                    if (data.routes) { routes = data.routes; localStorage.setItem('routes', JSON.stringify(routes)); }
                    if (data.coords) { coords = data.coords; localStorage.setItem('coords', JSON.stringify(coords)); }
                    if (data.errors) { errors = data.errors; localStorage.setItem('errors', JSON.stringify(errors)); }
                    if (data.quizStats) { quizStats = data.quizStats; localStorage.setItem('quizStats', JSON.stringify(quizStats)); }
                    saveToCloud(); location.reload();
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // ==================== AVVIO ====================
        // L'app viene avviata dal callback di Firebase (cloudRef.on 'value')
        // window.onload serve solo per timeout di sicurezza se Firebase non risponde
        window.onload = function() {
            // Se Firebase non risponde entro 6 secondi, avvia con la cache locale
            setTimeout(() => {
                if (!appReady) {
                    appReady = true;
                    document.getElementById('loadingOverlay').style.display = 'none';
                    initMap();
                    if (routes.length) selectRoute(routes[0]);
                    setSyncStatus('err', '❌ Offline');
                }
            }, 6000);
        };
    </script>
</body>
