<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NCC Milano">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Prontuario NCC Milano</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylinedecorator.css" />

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #0b1e33;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f4f6fb;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
            --shadow: 0 4px 16px rgba(0,0,0,0.06);
            --radius: 16px;
            --touch: 44px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex; flex-direction: column;
            height: 100vh; height: -webkit-fill-available;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* ====== HEADER ====== */
        header {
            background: var(--primary);
            color: white; padding: 8px 12px;
            z-index: 1000; flex-shrink: 0;
        }
        .header-container { display: flex; flex-direction: column; gap: 6px; }
        .search-box { position: relative; }
        #searchBar {
            width: 100%; padding: 10px 14px; font-size: 0.9rem;
            border: none; border-radius: 24px; outline: none;
            background: rgba(255,255,255,0.15); color: white;
            backdrop-filter: blur(10px);
        }
        #searchBar::placeholder { color: rgba(255,255,255,0.6); }
        .suggestions-list {
            position: absolute; top: 100%; left: 0; right: 0;
            background: white; border-radius: 12px; margin-top: 6px;
            box-shadow: var(--shadow); max-height: 160px;
            overflow-y: auto; z-index: 2000; display: none; list-style: none;
        }
        .suggestions-list li {
            padding: 12px 16px; cursor: pointer; color: var(--text);
            border-bottom: 1px solid var(--border); font-size: 0.9rem; font-weight: 600;
        }

        .header-actions {
            display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
            overflow-x: auto;
        }
        .mode-selector {
            display: flex; background: rgba(255,255,255,0.12);
            border-radius: 20px; padding: 2px; margin-right: auto;
        }
        .mode-btn {
            background: transparent; border: none; color: #cbd5e1;
            padding: 6px 14px; border-radius: 18px; cursor: pointer;
            font-weight: 700; font-size: 0.8rem; min-height: var(--touch);
        }
        .mode-btn.active { background: var(--accent); color: white; }

        .chip {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #e2e8f0; padding: 6px 12px; border-radius: 20px;
            cursor: pointer; font-weight: 600; font-size: 0.8rem; white-space: nowrap;
            min-height: var(--touch); display: inline-flex; align-items: center; gap: 4px;
        }
        .chip.primary { background: var(--accent); border-color: var(--accent); color: white; }
        .chip.danger { background: rgba(239,68,68,0.25); border-color: #ef4444; color: #fecaca; }

        /* ====== LAYOUT PRINCIPALE ====== */
        .main-container {
            flex: 1; display: flex; flex-direction: column;
            overflow: hidden;
        }
        #map { flex: 1; }

        .control-panel {
            width: 100%;
            background: var(--card);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
            z-index: 10;
            display: flex; flex-direction: column;
            border-radius: 20px 20px 0 0;
            max-height: 42vh;
            transition: max-height 0.3s;
        }
        .panel-header { padding: 12px 16px 6px; border-bottom: 1px solid var(--border); }
        .panel-header h2 { font-size: 1rem; font-weight: 700; }
        .panel-header p { font-size: 0.8rem; color: var(--accent); font-weight: 600; }

        .steps-container { flex: 1; overflow-y: auto; padding: 8px 12px; }
        .step-row {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; border-radius: 12px; margin-bottom: 4px;
            opacity: 0.45; font-size: 0.85rem; transition: all 0.2s;
        }
        .step-row.active { opacity: 1; background: #eef4ff; border-left: 4px solid var(--accent); font-weight: 700; }
        .step-row.completed { opacity: 0.7; }
        .step-number {
            width: 24px; height: 24px; background: #cbd5e1; color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; flex-shrink: 0;
        }
        .step-row.active .step-number { background: var(--accent); }

        .step-row.hidden-mode .step-name { background: #e2e8f0; color: transparent; border-radius: 6px; padding: 0 6px; }
        .step-row.hidden-mode.active .step-name { background: #b3d4ff; }
        .step-row.hidden-mode.completed .step-name,
        .step-row.hidden-mode.revealed .step-name { background: transparent; color: inherit; }

        .panel-footer { padding: 8px 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; padding-bottom: env(safe-area-inset-bottom); }
        .nav-buttons { display: flex; gap: 6px; }
        .btn {
            flex: 1; padding: 10px 4px; font-size: 0.85rem; font-weight: 700;
            border: none; border-radius: 14px; cursor: pointer; min-height: var(--touch);
            display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        .btn-secondary { background: #eef2f6; color: var(--text); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-street { background: var(--warning); color: #1e293b; }
        .btn-error { background: var(--danger); color: white; font-size: 0.8rem; }
        .btn-quiz-submit { background: #8b5cf6; color: white; }
        .btn:disabled { opacity: 0.35; }

        /* QUIZ */
        .quiz-input-area { display: flex; gap: 6px; margin-top: 6px; }
        .quiz-input-area input { flex: 1; padding: 10px; font-size: 0.9rem; border: 1px solid var(--border); border-radius: 12px; }
        .quiz-feedback { font-weight: bold; margin: 4px 0; font-size: 0.85rem; }

        /* MODALE */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center;
            z-index: 3000; visibility: hidden; opacity: 0; transition: all 0.2s;
        }
        .modal-overlay.open { visibility: visible; opacity: 1; }
        .modal-box {
            background: white; padding: 16px; border-radius: 24px;
            width: 92%; height: 85vh; display: flex; flex-direction: column; gap: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .modal-left { flex: 1; display: flex; flex-direction: column; gap: 8px; min-height: 0; }
        .modal-left h3 { font-size: 1rem; color: var(--primary); }
        .modal-left input, .modal-left textarea {
            width: 100%; padding: 12px; font-size: 0.9rem;
            border: 1px solid var(--border); border-radius: 12px;
            background: #f9fafb; outline: none; resize: vertical;
        }
        .add-step-box { display: flex; gap: 6px; flex-wrap: wrap; }
        #stepInput { flex: 1; }
        .btn-add-step {
            background: var(--accent); color: white; border: none;
            padding: 0 18px; border-radius: 12px; cursor: pointer;
            font-weight: bold; min-height: var(--touch);
        }
        .step-list-modal {
            flex: 1; overflow-y: auto; margin: 6px 0;
            border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
            padding: 6px 0; min-height: 0;
        }
        .step-item-modal {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 10px; border-radius: 10px; background: #f8fafc;
            margin-bottom: 4px; font-size: 0.85rem;
        }
        .step-item-modal button { background: none; border: none; color: var(--danger); font-size: 18px; cursor: pointer; }

        #modalMap { height: 35%; min-height: 140px; border-radius: 14px; border: 1px solid var(--border); position: relative; }
        .expand-map-btn {
            position: absolute; top: 6px; right: 6px; z-index: 500;
            background: white; border: none; border-radius: 50%; width: 32px; height: 32px;
            font-size: 18px; box-shadow: var(--shadow); cursor: pointer;
        }
        .modal-map-expanded #modalMap { height: 70vh !important; }

        .modal-buttons { display: flex; gap: 8px; }
        .btn-save { background: var(--success); color: white; border: none; padding: 12px; border-radius: 14px; font-weight: bold; flex:1; }
        .btn-close { background: #e2e8f0; color: var(--text); border: none; padding: 12px; border-radius: 14px; font-weight: bold; flex:1; }

        .toast-alert {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--success); color: white; padding: 12px 20px;
            border-radius: 24px; font-size: 0.85rem; font-weight: bold;
            z-index: 4000; display: none; box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .stats-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center;
            z-index: 3000; visibility: hidden; opacity: 0; transition: all 0.2s;
        }
        .stats-overlay.open { visibility: visible; opacity: 1; }
        .stats-box {
            background: white; border-radius: 24px; padding: 20px;
            width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .stats-box h3 { margin-bottom: 12px; }
        .stats-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px; border-radius: 12px; margin-bottom: 6px;
            background: #f8fafc; font-weight: 600; cursor: pointer;
        }
        .stats-item.high-error { background: #fee2e2; color: #b91c1c; }
        .progress-bar {
            width: 60px; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; margin-left: 8px;
        }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; }
        .stats-close {
            background: var(--danger); color: white; border: none;
            padding: 12px; border-radius: 14px; width: 100%; font-weight: bold; cursor: pointer;
        }

        /* ========== RESPONSIVE DESKTOP ========== */
        @media (min-width: 768px) {
            .main-container {
                flex-direction: row;
            }
            #map { flex: 1; min-width: 0; }
            .control-panel {
                width: 380px;
                max-height: none;
                border-radius: 20px 0 0 20px;
                border-left: 1px solid var(--border);
                box-shadow: -4px 0 20px rgba(0,0,0,0.06);
                flex-shrink: 0;
            }
            body.immersive .control-panel { display: none; }
            header { padding: 10px 24px; }
            .header-container { flex-direction: row; align-items: center; gap: 12px; }
            .search-box { flex: 1; max-width: 400px; }
            .header-actions { flex-wrap: nowrap; overflow-x: visible; margin-left: auto; }
            .modal-box { width: 700px; height: 80vh; }
        }

        body.immersive header, body.immersive .control-panel { display: none; }
        body.immersive #map { height: 100vh !important; }
        .immersive-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(11,30,51,0.9); color: white; border-radius: 30px;
            padding: 6px 16px; display: flex; align-items: center; gap: 10px;
            z-index: 1500; font-weight: bold; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        body.immersive .immersive-bar { opacity: 1; pointer-events: auto; }
        .immersive-exit {
            position: fixed; top: 16px; right: 16px; background: rgba(0,0,0,0.5);
            color: white; border: none; border-radius: 50%; width: 36px; height: 36px;
            font-size: 18px; display: flex; align-items: center; justify-content: center;
            z-index: 1500; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        body.immersive .immersive-exit { opacity: 1; pointer-events: auto; }
    </style>
</head>

<header>
    <div class="header-container">
        <div class="search-box">

            <ul id="suggestions" class="suggestions-list"></ul>
        </div>

            <div class="mode-selector">
                <button class="mode-btn active" id="modeStudio" onclick="setMode('studio')">Studio</button>
                <button class="mode-btn" id="modeEsame" onclick="setMode('esame')">Cieco</button>

<!-- MODALE AGGIUNTA PERCORSO -->

<script src="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylinedecorator.js"></script>
<script>
    (function() {
        // ========== DATI INIZIALI ==========
        const defaultRoutes = [{
            title: "CERCHIA DEI BASTIONI",
            steps: ["P.ZA 24 MAGGIO","V.LE GIAN GALEAZZO","P.LE DI PORTA LODOVICA","V.LE BEATRICE D'ESTE","L.GO ISABELLA D'ARAGONA","V.LE BEATRICE D'ESTE","V.LE FILIPPETTI","P.LE MEDAGLIE D'ORO","P.ZA 25 APRILE","VIALE CRISPI","BASTIONI DI PORTA VOLTA","P.LE BIANCAMANO","P.LE LEGA LOMBARDA","V.LE ELVEZIA","VIA MELZI D'ERIL","VIA CANOVA","VIALE CALDARA","VIALE REGINA MARGHERITA","V.LE MILTON","V.LE MOLIERE","P.ZA 5 GIORNATE","V.LE BIANCA MARIA","P.ZA DEL TRICOLORE","V.LE MAJNO","VIA CURIE","VIA 20 SETTEMBRE","P.ZA CONCILIAZIONE","VIA ENRICO TOTI","P.ZA OBERDAN","P.LE BARACCA","BASTIONI DI PORTA VENEZIA","VIALE CITTA' DI FIUME","P.ZA DELLA REPUBBLICA","VIALE MONTESANTO","P.LE PRINCIPESSA CLOTILDE","V.LE DI PORTA VERCELLINA","P.LE AQUILEIA","V.LE PAPINIANO","P.ZA SANT'AGOSTINO","V.LE PAPINIANO","BASTIONI DI PORTA NUOVA","P.LE GENERAL CANTORE","V.LE GABRIELE D'ANNUNZIO","P.ZA 24 MAGGIO"]
        }];

        let routesData = JSON.parse(localStorage.getItem('customRoutesList')) || defaultRoutes;
        let map, modalMap;
        let currentRoute = null, currentStepIndex = -1;
        let currentMarker = null;
        let completedPolyline = null, completedDecorator = null, remainingPolyline = null;
        let polylineCoords = [];
        let currentMode = 'studio';
        let customCoordinates = JSON.parse(localStorage.getItem('customRouteCoords')) || {};
        let errorStats = JSON.parse(localStorage.getItem('errorStats')) || {};
        let quizStats = JSON.parse(localStorage.getItem('quizStats')) || {};
        let modalMarkers = [];
        let currentModalSteps = [];

        // ========== FIREBASE SYNC ==========
        const rootRef = db.ref('prontuario');

        function salvaSuCloud() {
            const data = {
                routesList: JSON.parse(localStorage.getItem('customRoutesList') || '[]'),
                routeCoords: JSON.parse(localStorage.getItem('customRouteCoords') || '{}'),
                errorStats: JSON.parse(localStorage.getItem('errorStats') || '{}'),
                quizStats: JSON.parse(localStorage.getItem('quizStats') || '{}')
            };
            rootRef.set(data).catch(err => console.warn('Errore salvataggio cloud:', err));
        }

        function caricaDaCloud() {
            rootRef.once('value').then(snapshot => {
                const data = snapshot.val();
                if (data) {
                    let changed = false;
                    const currentRoutes = JSON.stringify(routesData);
                    const currentCoords = JSON.stringify(customCoordinates);
                    const currentErrors = JSON.stringify(errorStats);
                    const currentQuiz = JSON.stringify(quizStats);

                    if (data.routesList && JSON.stringify(data.routesList) !== currentRoutes) {
                        localStorage.setItem('customRoutesList', JSON.stringify(data.routesList));
                        changed = true;
                    }
                    if (data.routeCoords && JSON.stringify(data.routeCoords) !== currentCoords) {
                        localStorage.setItem('customRouteCoords', JSON.stringify(data.routeCoords));
                        changed = true;
                    }
                    if (data.errorStats && JSON.stringify(data.errorStats) !== currentErrors) {
                        localStorage.setItem('errorStats', JSON.stringify(data.errorStats));
                        changed = true;
                    }
                    if (data.quizStats && JSON.stringify(data.quizStats) !== currentQuiz) {
                        localStorage.setItem('quizStats', JSON.stringify(data.quizStats));
                        changed = true;
                    }

                    if (changed) {
                        location.reload();
                    }
                } else {
                    // Primo accesso: carica i dati locali sul cloud
                    salvaSuCloud();
                }
            }).catch(err => {
                console.warn('Firebase offline, uso dati locali:', err);
            });
        }

        // ========== INIZIALIZZAZIONE ==========
        window.initMap = function() {
            map = L.map('map', { zoomControl: false }).setView([45.4642, 9.1900], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            L.control.zoom({ position: 'topright' }).addTo(map);
            const resetBtn = L.DomUtil.create('a', 'custom-reset-btn', map.zoomControl.getContainer());
            resetBtn.innerHTML = '🎯';
            resetBtn.title = 'Riposiziona';
            L.DomEvent.on(resetBtn, 'click', () => {
                if (currentMarker) {
                    map.flyTo(currentMarker.getLatLng(), 16);
                    currentMarker.openPopup();
                }
            });
        };

        // ========== MODALE NUOVO PERCORSO ==========
        window.openAddModal = function() {
            document.getElementById('routeModal').classList.add('open');
            currentModalSteps = [];
            renderModalStepList();
            clearModalMarkers();
            document.getElementById('newRouteTitle').value = '';
            document.getElementById('stepInput').value = '';
            document.getElementById('multipleStepsInput').style.display = 'none';
            if (!modalMap) {
                modalMap = L.map('modalMap', { zoomControl: false }).setView([45.4642, 9.1900], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(modalMap);
            } else {
                setTimeout(() => modalMap.invalidateSize(), 200);
            }
        };
        window.closeAddModal = function() {
            document.getElementById('routeModal').classList.remove('open');
            clearModalMarkers();
        };
        function clearModalMarkers() { modalMarkers.forEach(m => modalMap.removeLayer(m)); modalMarkers = []; }

        window.addStepFromInput = function() {
            const input = document.getElementById('stepInput');
            const via = input.value.trim().toUpperCase();
            if (!via) return;
            addStepToModal(via);
            input.value = '';
        };

        window.addMultipleSteps = function() {
            const textarea = document.getElementById('multipleStepsInput');
            const lines = textarea.value.split('\n').map(l => l.trim().toUpperCase()).filter(l => l);
            if (lines.length === 0) {
                textarea.style.display = textarea.style.display === 'none' ? 'block' : 'none';
                return;
            }
            lines.forEach(line => addStepToModal(line));
            textarea.value = '';
            textarea.style.display = 'none';
        };

        function addStepToModal(via) {
            currentModalSteps.push(via);
            renderModalStepList();
            const idx = currentModalSteps.length - 1;
            const title = document.getElementById('newRouteTitle').value.trim().toUpperCase() || "TEMP";
            const cacheKey = `${title}_${idx}`;
            if (customCoordinates[cacheKey]) {
                createModalMarker(customCoordinates[cacheKey].lat, customCoordinates[cacheKey].lon, via, idx, title);
            } else {
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(via+', Milano, Italia')}`, {
                    headers: { 'User-Agent': 'ProntuarioNCC/2.0' }
                })
                .then(r => r.json())
                .then(data => {
                    if (data && data.length > 0) {
                        createModalMarker(parseFloat(data[0].lat), parseFloat(data[0].lon), via, idx, title);
                    } else {
                        const fallbackCenter = modalMap ? modalMap.getCenter() : L.latLng(45.4642, 9.1900);
                        createModalMarker(fallbackCenter.lat, fallbackCenter.lng, via, idx, title);
                    }
                })
                .catch(() => {
                    const fallbackCenter = modalMap ? modalMap.getCenter() : L.latLng(45.4642, 9.1900);
                    createModalMarker(fallbackCenter.lat, fallbackCenter.lng, via, idx, title);
                });
            }
        }

        window.removeStepFromModal = function(index) {
            currentModalSteps.splice(index, 1);
            renderModalStepList();
            clearModalMarkers();
            const title = document.getElementById('newRouteTitle').value.trim().toUpperCase() || "TEMP";
            currentModalSteps.forEach((step, idx) => {
                const cacheKey = `${title}_${idx}`;
                if (customCoordinates[cacheKey]) {
                    createModalMarker(customCoordinates[cacheKey].lat, customCoordinates[cacheKey].lon, step, idx, title);
                } else {
                    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(step+', Milano, Italia')}`, {
                        headers: { 'User-Agent': 'ProntuarioNCC/2.0' }
                    }).then(r => r.json()).then(data => {
                        if (data && data.length > 0) createModalMarker(parseFloat(data[0].lat), parseFloat(data[0].lon), step, idx, title);
                        else {
                            const fallbackCenter = modalMap ? modalMap.getCenter() : L.latLng(45.4642, 9.1900);
                            createModalMarker(fallbackCenter.lat, fallbackCenter.lng, step, idx, title);
                        }
                    }).catch(() => {
                        const fallbackCenter = modalMap ? modalMap.getCenter() : L.latLng(45.4642, 9.1900);
                        createModalMarker(fallbackCenter.lat, fallbackCenter.lng, step, idx, title);
                    });
                }
            });
        };

        function renderModalStepList() {
            const container = document.getElementById('modalStepList');
            container.innerHTML = '';
            currentModalSteps.forEach((step, idx) => {
                const div = document.createElement('div');
                div.className = 'step-item-modal';
                div.innerHTML = `<span>${idx+1}. ${step}</span><button onclick="removeStepFromModal(${idx})">✕</button>`;
                container.appendChild(div);
            });
        }

        function createModalMarker(lat, lon, step, idx, title) {
            const m = L.marker([lat, lon], { draggable: true }).addTo(modalMap)
                .bindPopup(`<b>${step}</b><br><a href="https://www.google.com/maps?layer=c&cbll=${lat},${lon}" target="_blank" style="color:#2563eb;">📸 Street View</a>`)
                .bindTooltip(`${idx+1}. ${step}`, { permanent: true, direction: 'top' });
            m.on('dragend', () => {
                const p = m.getLatLng();
                const currentTitle = document.getElementById('newRouteTitle').value.trim().toUpperCase() || "TEMP";
                customCoordinates[`${currentTitle}_${idx}`] = { lat: p.lat, lon: p.lng };
                localStorage.setItem('customRouteCoords', JSON.stringify(customCoordinates));
                salvaSuCloud();
                m.setPopupContent(`<b>${step}</b><br><a href="https://www.google.com/maps?layer=c&cbll=${p.lat},${p.lng}" target="_blank" style="color:#2563eb;">📸 Street View</a>`);
            });
            modalMarkers.push(m);
            if (idx === 0) modalMap.setView([lat, lon], 13);
        }

        window.toggleModalMapExpand = function() {
            document.getElementById('routeModal').classList.toggle('modal-map-expanded');
            setTimeout(() => modalMap.invalidateSize(), 100);
        };

        window.saveNewRoute = function() {
            const title = document.getElementById('newRouteTitle').value.trim().toUpperCase();
            if (!title || currentModalSteps.length === 0) return alert("Inserisci titolo e almeno una via.");
            for (let i = 0; i < currentModalSteps.length; i++) {
                const oldKey = `TEMP_${i}`;
                const newKey = `${title}_${i}`;
                if (customCoordinates[oldKey] && !customCoordinates[newKey]) {
                    customCoordinates[newKey] = customCoordinates[oldKey];
                    delete customCoordinates[oldKey];
                }
            }
            localStorage.setItem('customRouteCoords', JSON.stringify(customCoordinates));
            routesData.push({ title, steps: currentModalSteps });
            localStorage.setItem('customRoutesList', JSON.stringify(routesData));
            if (!errorStats[title]) errorStats[title] = { errors: 0, completed: false, totalSteps: currentModalSteps.length };
            if (!quizStats[title]) quizStats[title] = { correct: 0, total: 0, lastResult: null };
            localStorage.setItem('errorStats', JSON.stringify(errorStats));
            localStorage.setItem('quizStats', JSON.stringify(quizStats));
            salvaSuCloud();
            showToast("Percorso salvato!");
            closeAddModal();
        };

        window.markError = function() {
            if (!currentRoute) return;
            const key = currentRoute.title;
            if (!errorStats[key]) errorStats[key] = { errors: 0, completed: false, totalSteps: currentRoute.steps.length };
            errorStats[key].errors += 1;
            localStorage.setItem('errorStats', JSON.stringify(errorStats));
            salvaSuCloud();
            showToast("❌ Errore registrato");
        };

        window.openStats = function() {
            document.getElementById('statsModal').classList.add('open');
            renderStats();
        };
        window.closeStats = function() {
            document.getElementById('statsModal').classList.remove('open');
        };

        function renderStats() {
            const container = document.getElementById('statsList');
            container.innerHTML = '';
            const statsEntries = Object.entries(errorStats);
            if (statsEntries.length === 0) {
                container.innerHTML = '<p>Nessuna statistica disponibile.</p>';
                return;
            }
            statsEntries.forEach(([title, stat]) => {
                const errorPercent = stat.totalSteps ? Math.round((stat.errors / stat.totalSteps) * 100) : 0;
                const quizStat = quizStats[title] || { correct: 0, total: 0 };
                const quizPercent = quizStat.total ? Math.round((quizStat.correct / quizStat.total) * 100) : 0;
                const isHighError = errorPercent > 30;
                const div = document.createElement('div');
                div.className = `stats-item ${isHighError ? 'high-error' : ''}`;
                div.innerHTML = `
                    <span>${title} (${stat.completed ? '✅' : '⏳'})</span>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span>${errorPercent}% err</span>
                        <span>| Quiz: ${quizPercent}%</span>
                        <div class="progress-bar"><div class="progress-fill" style="width:${Math.max(errorPercent, quizPercent)}%;${isHighError?'background:#ef4444;':''}"></div></div>
                    </div>
                `;
                div.onclick = () => {
                    if (confirm(`Rifare "${title}"?`)) {
                        const route = routesData.find(r => r.title === title);
                        if (route) selectRoute(route);
                        closeStats();
                    }
                };
                container.appendChild(div);
            });
        }

        window.resetAllCoordinates = function() {
            if (confirm("Cancellare solo le correzioni di posizione?")) {
                localStorage.removeItem('customRouteCoords');
                salvaSuCloud();
                location.reload();
            }
        };

        window.exportData = function() {
            const data = {
                routesList: routesData,
                routeCoords: customCoordinates,
                errorStats: errorStats,
                quizStats: quizStats
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `prontuario_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        };

        window.importData = function() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (data.routesList) localStorage.setItem('customRoutesList', JSON.stringify(data.routesList));
                        if (data.routeCoords) localStorage.setItem('customRouteCoords', JSON.stringify(data.routeCoords));
                        if (data.errorStats) localStorage.setItem('errorStats', JSON.stringify(data.errorStats));
                        if (data.quizStats) localStorage.setItem('quizStats', JSON.stringify(data.quizStats));
                        salvaSuCloud();
                        alert('Backup importato! Ricarica la pagina.');
                        location.reload();
                    } catch { alert('File non valido.'); }
                };
                reader.readAsText(file);
            };
            input.click();
        };

        window.selectRandomRoute = () => {
            if (routesData.length) selectRoute(routesData[Math.floor(Math.random() * routesData.length)]);
        };

        window.setMode = function(mode) {
            currentMode = mode;
            document.getElementById('modeStudio').classList.toggle('active', mode==='studio');
            document.getElementById('modeEsame').classList.toggle('active', mode==='esame');
            document.getElementById('modeQuiz').classList.toggle('active', mode==='quiz');
            document.getElementById('btnReveal').style.display = mode==='esame' ? 'block' : 'none';
            document.getElementById('btnError').style.display = mode==='esame' ? 'flex' : 'none';
            document.getElementById('normalFooter').style.display = (mode==='quiz') ? 'none' : 'block';
            document.getElementById('quizFooter').style.display = (mode==='quiz') ? 'block' : 'none';
            if (currentRoute) {
                renderStepsList();
                if (mode==='quiz') resetQuizStep();
            }
        };

        window.showSuggestions = function() {
            const input = document.getElementById('searchBar').value.toUpperCase();
            const list = document.getElementById('suggestions');
            list.innerHTML = '';
            if (!input) { list.style.display = 'none'; return; }
            const filtered = routesData.filter(r => r.title.includes(input));
            if (filtered.length) {
                filtered.forEach(r => {
                    const li = document.createElement('li'); li.textContent = r.title;
                    li.onclick = () => selectRoute(r);
                    list.appendChild(li);
                });
                list.style.display = 'block';
            } else list.style.display = 'none';
        };

        function selectRoute(route) {
            currentRoute = route;
            currentStepIndex = 0;
            document.getElementById('searchBar').value = route.title;
            document.getElementById('suggestions').style.display = 'none';
            document.getElementById('currentRouteTitle').textContent = route.title;
            if (currentMarker) map.removeLayer(currentMarker);
            clearPolylines();
            polylineCoords = [];
            if (!errorStats[route.title]) errorStats[route.title] = { errors: 0, completed: false, totalSteps: route.steps.length };
            if (!quizStats[route.title]) quizStats[route.title] = { correct: 0, total: 0, lastResult: null };
            renderStepsList();
            updateInterface();
            goToCurrentStepLocation();
            if (currentMode==='quiz') resetQuizStep();
        }

        function renderStepsList() {
            const container = document.getElementById('stepsList');
            container.innerHTML = '';
            currentRoute.steps.forEach((step, i) => {
                const div = document.createElement('div');
                let cls = '';
                if (i === currentStepIndex) cls = 'active';
                else if (i < currentStepIndex) cls = 'completed';
                div.className = `step-row ${currentMode==='esame'||currentMode==='quiz'?'hidden-mode':''} ${cls}`;
                div.id = `step-${i}`;
                div.innerHTML = `<div class="step-number">${i+1}</div><div class="step-name">${step}</div>`;
                container.appendChild(div);
            });
        }

        window.nextStep = function() {
            if (!currentRoute || currentStepIndex >= currentRoute.steps.length - 1) return;
            document.getElementById(`step-${currentStepIndex}`).className = `step-row completed`;
            currentStepIndex++;
            document.getElementById(`step-${currentStepIndex}`).className = `step-row active`;
            document.getElementById(`step-${currentStepIndex}`).scrollIntoView({ behavior:'smooth', block:'nearest' });
            updateInterface();
            goToCurrentStepLocation();
            if (currentMode==='esame') navigator.vibrate?.(50);
            if (currentMode==='quiz') resetQuizStep();

            if (currentStepIndex === currentRoute.steps.length - 1) {
                errorStats[currentRoute.title].completed = true;
                localStorage.setItem('errorStats', JSON.stringify(errorStats));
                salvaSuCloud();
                if (currentMode!=='quiz') {
                    setTimeout(() => {
                        showToast("🎉 Percorso completato! Passo a un altro.");
                        selectRandomRoute();
                    }, 800);
                }
            }
        };

        window.prevStep = function() {
            if (currentStepIndex > 0) {
                document.getElementById(`step-${currentStepIndex}`).className = '';
                currentStepIndex--;
                document.getElementById(`step-${currentStepIndex}`).className = `step-row active`;
                document.getElementById(`step-${currentStepIndex}`).scrollIntoView({ behavior:'smooth', block:'nearest' });
                updateInterface();
                goToCurrentStepLocation(true);
                if (currentMode==='quiz') resetQuizStep();
            }
        };

        window.revealCurrentStep = function() {
            if (currentRoute) document.getElementById(`step-${currentStepIndex}`).classList.add('revealed');
        };

        function updateInterface() {
            document.getElementById('routeProgress').textContent = `Via ${currentStepIndex+1} di ${currentRoute.steps.length}`;
            document.getElementById('btnPrev').disabled = currentStepIndex === 0;
            document.getElementById('btnNext').disabled = currentStepIndex === currentRoute.steps.length - 1;
            document.getElementById('btnStreet').disabled = !currentMarker;
            document.getElementById('btnError').disabled = !currentRoute;
            updateImmersiveBar();
        }

        function updateImmersiveBar() {
            if (!currentRoute) return;
            document.getElementById('immersiveProgress').textContent = `${currentStepIndex+1}/${currentRoute.steps.length}`;
            document.getElementById('immersiveStepName').textContent = currentRoute.steps[currentStepIndex];
        }

        window.openRealStreetView = function() {
            if (currentMarker) {
                const p = currentMarker.getLatLng();
                window.open(`https://www.google.com/maps?layer=c&cbll=${p.lat},${p.lng}`, '_blank');
            }
        };

        function resetQuizStep() {
            document.getElementById('quizAnswer').value = '';
            document.getElementById('quizFeedback').textContent = '';
            document.getElementById('quizAnswer').focus();
        }

        window.checkQuizAnswer = function() {
            if (!currentRoute) return;
            const correctAnswer = currentRoute.steps[currentStepIndex].toUpperCase().trim();
            const userAnswer = document.getElementById('quizAnswer').value.toUpperCase().trim();
            const feedback = document.getElementById('quizFeedback');

            if (!quizStats[currentRoute.title]) {
                quizStats[currentRoute.title] = { correct: 0, total: 0, lastResult: null };
            }
            quizStats[currentRoute.title].total += 1;

            if (userAnswer === correctAnswer) {
                feedback.textContent = '✅ Corretto!';
                feedback.style.color = 'var(--success)';
                quizStats[currentRoute.title].correct += 1;
                localStorage.setItem('quizStats', JSON.stringify(quizStats));
                salvaSuCloud();
                setTimeout(() => {
                    if (currentStepIndex < currentRoute.steps.length - 1) {
                        nextStep();
                    } else {
                        feedback.textContent = '🎉 Percorso completato!';
                        errorStats[currentRoute.title].completed = true;
                        localStorage.setItem('errorStats', JSON.stringify(errorStats));
                        salvaSuCloud();
                    }
                }, 600);
            } else {
                feedback.textContent = `❌ Sbagliato! La via è: ${correctAnswer}`;
                feedback.style.color = 'var(--danger)';
                localStorage.setItem('quizStats', JSON.stringify(quizStats));
                salvaSuCloud();
            }
        };

        window.skipQuizStep = function() {
            if (!currentRoute) return;
            const feedback = document.getElementById('quizFeedback');
            feedback.textContent = `Risposta: ${currentRoute.steps[currentStepIndex]}`;
            feedback.style.color = 'var(--warning)';
            if (!quizStats[currentRoute.title]) quizStats[currentRoute.title] = { correct: 0, total: 0, lastResult: null };
            quizStats[currentRoute.title].total += 1;
            localStorage.setItem('quizStats', JSON.stringify(quizStats));
            salvaSuCloud();
            setTimeout(() => {
                if (currentStepIndex < currentRoute.steps.length - 1) {
                    nextStep();
                } else {
                    feedback.textContent = '🎉 Percorso completato!';
                    errorStats[currentRoute.title].completed = true;
                    localStorage.setItem('errorStats', JSON.stringify(errorStats));
                    salvaSuCloud();
                }
            }, 600);
        };

        window.revealQuizStep = function() {
            if (currentRoute) {
                document.getElementById(`step-${currentStepIndex}`).classList.add('revealed');
                document.getElementById('quizFeedback').textContent = `La via è: ${currentRoute.steps[currentStepIndex]}`;
                document.getElementById('quizFeedback').style.color = 'var(--accent)';
            }
        };

        function goToCurrentStepLocation(isGoingBack = false) {
            const stepName = currentRoute.steps[currentStepIndex];
            const cacheKey = `${currentRoute.title}_${currentStepIndex}`;
            if (customCoordinates[cacheKey]) {
                placeMarker(customCoordinates[cacheKey].lat, customCoordinates[cacheKey].lon, stepName, cacheKey, isGoingBack);
                return;
            }
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(stepName+', Milano, Italia')}`, {
                headers: { 'User-Agent': 'ProntuarioNCC/2.0' }
            })
            .then(r => r.json())
            .then(data => {
                if (data && data.length > 0) placeMarker(parseFloat(data[0].lat), parseFloat(data[0].lon), stepName, cacheKey, isGoingBack);
            });
        }

        function clearPolylines() {
            if (completedDecorator) { map.removeLayer(completedDecorator); completedDecorator = null; }
            if (completedPolyline) { map.removeLayer(completedPolyline); completedPolyline = null; }
            if (remainingPolyline) { map.removeLayer(remainingPolyline); remainingPolyline = null; }
        }

        function drawProgressivePath() {
            clearPolylines();
            if (polylineCoords.length < 2) return;
            const doneCoords = polylineCoords.slice(0, currentStepIndex + 1);
            if (doneCoords.length >= 2) {
                completedPolyline = L.polyline(doneCoords, { color: '#2563eb', weight: 5, opacity: 0.95 }).addTo(map);
                completedDecorator = L.polylineDecorator(completedPolyline, {
                    patterns: [{ offset: '5%', repeat: '100px', symbol: L.Symbol.arrowHead({ pixelSize: 14, pathOptions: { color: '#1e40af', weight: 3 } }) }]
                }).addTo(map);
            }
            if (polylineCoords.length > currentStepIndex + 1) {
                const remaining = polylineCoords.slice(currentStepIndex);
                remainingPolyline = L.polyline(remaining, { color: '#94a3b8', weight: 3, opacity: 0.5, dashArray: '6 6' }).addTo(map);
            }
        }

        function placeMarker(lat, lon, name, cacheKey, isGoingBack) {
            map.flyTo([lat, lon], 16, { animate: true, duration: 0.4 });
            const pt = L.latLng(lat, lon);
            if (!isGoingBack) polylineCoords[currentStepIndex] = pt;
            else polylineCoords.splice(currentStepIndex + 1);
            drawProgressivePath();
            if (currentMarker) {
                currentMarker.setLatLng(pt);
                currentMarker.getPopup().setContent(currentMode === 'quiz' ? '📍 Posizione misteriosa' : `<b>${name}</b><br>Trascina per correggere.`);
            } else {
                const popupContent = currentMode === 'quiz' ? '📍 Posizione misteriosa' : `<b>${name}</b><br>Trascina per correggere.`;
                currentMarker = L.marker(pt, { draggable: true }).addTo(map).bindPopup(popupContent);
            }
            currentMarker.openPopup();
            updateInterface();
            currentMarker.off('dragend');
            currentMarker.on('dragend', function() {
                const pos = currentMarker.getLatLng();
                customCoordinates[cacheKey] = { lat: pos.lat, lon: pos.lng };
                localStorage.setItem('customRouteCoords', JSON.stringify(customCoordinates));
                salvaSuCloud();
                polylineCoords[currentStepIndex] = pos;
                drawProgressivePath();
                showToast("📍 Posizione aggiornata!");
            });
        }

        window.toggleImmersive = function() {
            document.body.classList.toggle('immersive');
            setTimeout(() => map.invalidateSize(), 150);
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }

        // Avvio con sync cloud
        window.onload = function() {
            initMap();
            caricaDaCloud();
        };
    })();
</script>
</body>
</html>
