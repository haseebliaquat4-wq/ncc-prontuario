<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NCC Prontuario • Percorsi Milano</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylinedecorator.css" />
    <style>
        :root {
            --bg-dark: #0a0f1a;
            --glass-bg: rgba(20, 30, 45, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --success: #10b981;
            --danger: #ef4444;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --card: #141e2d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        header {
            backdrop-filter: blur(25px) saturate(180%);
            background: var(--glass-bg);
            border-bottom: 1px solid var(--glass-border);
            padding: 12px 16px 8px;
            z-index: 1000;
            flex-shrink: 0;
        }
        .header-container { display: flex; flex-direction: column; gap: 10px; }
        .search-box { position: relative; }
        #searchBar {
            width: 100%; padding: 12px 18px; font-size: 16px;
            border: none; border-radius: 30px; outline: none;
            background: rgba(255,255,255,0.08); color: white;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }
        #searchBar:focus {
            background: rgba(255,255,255,0.15);
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .suggestions-list {
            position: absolute; top: 100%; left: 0; right: 0;
            background: rgba(20,30,45,0.95); border-radius: 12px; margin-top: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-height: 180px;
            overflow-y: auto; z-index: 2000; display: none; padding: 0; list-style: none;
            backdrop-filter: blur(20px);
        }
        .suggestions-list li {
            padding: 14px 18px; cursor: pointer; color: #cbd5e1;
            border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 600;
            transition: background 0.2s;
        }
        .suggestions-list li:hover { background: rgba(59,130,246,0.2); }

        .header-actions { display: flex; align-items: center; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .header-actions::-webkit-scrollbar { display: none; }

        .chip {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            color: #cbd5e1; padding: 8px 14px; border-radius: 20px;
            cursor: pointer; font-weight: 700; font-size: 12px;
            backdrop-filter: blur(10px); white-space: nowrap;
            transition: all 0.2s;
        }
        .chip.active { background: var(--accent); color: white; border-color: var(--accent); }
        .chip:hover { background: rgba(255,255,255,0.12); }
        .chip.primary { background: var(--accent); color: white; border: none; }
        .chip.danger { background: rgba(239,68,68,0.2); border-color: var(--danger); color: #fca5a5; }

        .mode-selector { display: flex; background: rgba(255,255,255,0.06); border-radius: 20px; padding: 2px; }
        .mode-btn {
            background: transparent; border: none; color: #94a3b8;
            padding: 8px 16px; border-radius: 18px; cursor: pointer;
            font-weight: 700; font-size: 13px; transition: all 0.2s;
        }
        .mode-btn.active { background: var(--accent); color: white; }

        .main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #map { flex: 1; width: 100%; z-index: 1; }

        .leaflet-bar .custom-reset-btn {
            background: rgba(20,30,45,0.8); color: white; width: 34px; height: 34px;
            line-height: 34px; display: block; text-align: center;
            text-decoration: none; font-size: 18px; cursor: pointer;
            border-top: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
        }

        .control-panel {
            width: 100%; height: 44vh; background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(180%);
            border-top: 1px solid var(--glass-border);
            z-index: 10; display: flex; flex-direction: column;
            border-top-left-radius: 24px; border-top-right-radius: 24px;
            transition: height 0.3s ease;
        }
        .panel-header { padding: 16px 20px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .panel-header h2 { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
        .panel-header p { font-size: 13px; color: var(--accent); font-weight: 600; }

        .steps-container { flex: 1; overflow-y: auto; padding: 8px 16px; }
        .step-row {
            display: flex; align-items: center; gap: 12px; padding: 12px 14px;
            border-radius: 12px; margin-bottom: 4px; opacity: 0.5;
            font-size: 14px; transition: all 0.2s;
        }
        .step-row.active {
            opacity: 1; background: rgba(59,130,246,0.15);
            border-left: 3px solid var(--accent); font-weight: 800;
        }
        .step-row.completed { opacity: 0.75; }
        .step-number {
            width: 26px; height: 26px; background: rgba(255,255,255,0.1);
            color: white; border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; flex-shrink: 0;
        }
        .step-row.active .step-number { background: var(--accent); }

        .step-row.hidden-mode .step-name {
            background: rgba(255,255,255,0.1); color: transparent; border-radius: 6px;
            user-select: none;
        }
        .step-row.hidden-mode.active .step-name { background: rgba(59,130,246,0.3); }
        .step-row.hidden-mode.completed .step-name,
        .step-row.hidden-mode.revealed .step-name { background: transparent; color: inherit; }

        .panel-footer {
            padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; gap: 8px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }
        .nav-buttons { display: flex; gap: 10px; }
        .btn {
            flex: 1; padding: 14px; font-size: 14px; font-weight: 800;
            border: none; border-radius: 16px; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-secondary { background: rgba(255,255,255,0.08); color: #e2e8f0; }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 15px var(--accent-glow); }
        .btn-street { background: #f59e0b; color: #0f172a; }
        .btn:disabled { opacity: 0.3; transform: none; }
        .btn:active:not(:disabled) { transform: scale(0.96); }

        /* MODALE (nuova interfaccia) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center;
            z-index: 3000; visibility: hidden; opacity: 0; transition: all 0.2s;
        }
        .modal-overlay.open { visibility: visible; opacity: 1; }
        .modal-box {
            background: var(--card); border-radius: 24px; padding: 20px;
            width: 90%; height: 88vh; display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid var(--glass-border);
        }
        .modal-left { display: flex; flex-direction: column; gap: 10px; flex: 1; overflow: hidden; }
        .modal-left h3 { font-size: 18px; }

        /* Nuovo input per titolo */
        #newRouteTitle {
            width: 100%; padding: 12px; font-size: 14px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: white; outline: none;
        }

        /* Barra per aggiungere una via */
        .add-step-box {
            display: flex; gap: 8px;
        }
        #stepInput {
            flex: 1; padding: 12px; font-size: 14px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: white; outline: none;
        }
        .btn-add-step {
            background: var(--accent); color: white; border: none;
            padding: 12px 16px; border-radius: 12px; cursor: pointer;
            font-weight: bold; white-space: nowrap;
        }

        /* Elenco vie aggiunte */
        .step-list-modal {
            flex: 1; overflow-y: auto; margin: 10px 0;
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 8px 0;
        }
        .step-item-modal {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 12px; border-radius: 8px; background: rgba(255,255,255,0.03);
            margin-bottom: 4px; font-size: 14px;
        }
        .step-item-modal span { flex: 1; }
        .step-item-modal button {
            background: none; border: none; color: #fca5a5; font-size: 18px;
            cursor: pointer; padding: 0 4px;
        }

        #modalMap { height: 35%; min-height: 140px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); margin-top: 8px; }

        .modal-buttons { display: flex; gap: 10px; margin-top: 8px; }
        .btn-save { background: var(--success); color: white; border: none; padding: 14px; border-radius: 14px; cursor: pointer; font-weight: bold; flex:1; }
        .btn-close { background: rgba(255,255,255,0.1); color: white; border: none; padding: 14px; border-radius: 14px; cursor: pointer; font-weight: bold; flex:1; }

        .toast-alert {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: var(--success); color: white; padding: 12px 24px;
            border-radius: 30px; font-weight: bold; z-index: 4000; display: none;
            box-shadow: 0 10px 25px rgba(16,185,129,0.4);
        }

        body.immersive header { height:0; padding:0; overflow:hidden; }
        body.immersive .control-panel { height:0; padding:0; overflow:hidden; border-radius:0; }
        body.immersive #map { height:100vh !important; }

        .immersive-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10,15,26,0.85); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 8px 18px;
            display: flex; align-items: center; gap: 12px;
            z-index: 1500; border: 1px solid rgba(255,255,255,0.1);
            font-weight: bold; opacity:0; pointer-events:none; transition:0.3s;
        }
        body.immersive .immersive-bar { opacity:1; pointer-events:auto; }
        .immersive-step-name {
            font-size: 14px; max-width: 120px; overflow: hidden; text-overflow: ellipsis;
            background: rgba(255,255,255,0.1); color: transparent; border-radius: 6px; padding:0 4px;
        }
        .immersive-step-name.revealed { background: transparent; color: white; }
        .immersive-nav button {
            background: rgba(255,255,255,0.1); border: none; border-radius: 50%;
            width: 34px; height: 34px; color: white; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .immersive-exit {
            position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.6);
            border-radius: 50%; width: 38px; height: 38px; border: none; color: white;
            font-size: 20px; z-index: 1500; opacity:0; pointer-events:none; transition:0.3s;
        }
        body.immersive .immersive-exit { opacity:1; pointer-events:auto; }
    </style>
</head>
<body>

<header>
    <div class="header-container">
        <div class="search-box">
            <input type="text" id="searchBar" placeholder="🔍 Cerca percorso..." autocomplete="off" oninput="showSuggestions()">
            <ul id="suggestions" class="suggestions-list"></ul>
        </div>
        <div class="header-actions">
            <div class="mode-selector">
                <button class="mode-btn active" id="modeStudio" onclick="setMode('studio')">Studio</button>
                <button class="mode-btn" id="modeEsame" onclick="setMode('esame')">Cieco</button>
            </div>
            <button class="chip" onclick="selectRandomRoute()">🔀 Random</button>
            <button class="chip primary" onclick="openAddModal()">➕ Nuovo</button>
            <button class="chip danger" onclick="resetAllCoordinates()">🔄 Reset</button>
            <button class="chip" onclick="toggleImmersive()" title="Fullscreen">🖥️</button>
        </div>
    </div>
</header>

<div class="main-container">
    <div id="map"></div>

    <div class="control-panel">
        <div class="panel-header">
            <h2 id="currentRouteTitle">Prontuario NCC</h2>
            <p id="routeProgress">Seleziona un percorso per iniziare</p>
        </div>
        <div class="steps-container" id="stepsList"></div>
        <div class="panel-footer">
            <div class="nav-buttons">
                <button class="btn btn-secondary" id="btnPrev" onclick="prevStep()" disabled>◀ Indietro</button>
                <button class="btn btn-street" id="btnStreet" onclick="openRealStreetView()" disabled>👁️ 360°</button>
                <button class="btn btn-primary" id="btnNext" onclick="nextStep()" disabled>Avanti ▶</button>
            </div>
            <button class="btn btn-secondary" id="btnReveal" onclick="revealCurrentStep()" style="display:none;">👁️ Scopri via</button>
        </div>
    </div>
</div>

<!-- MODALE RIDESIGNATA -->
<div class="modal-overlay" id="routeModal">
    <div class="modal-box">
        <div class="modal-left">
            <h3>➕ Nuovo Percorso</h3>
            <input type="text" id="newRouteTitle" placeholder="TITOLO (es. LINATE - SAN SIRO)">
            
            <div class="add-step-box">
                <input type="text" id="stepInput" placeholder="Scrivi una via e premi INVIO..." onkeydown="handleStepKeydown(event)">
                <button class="btn-add-step" onclick="addStepFromInput()">➕</button>
            </div>

            <div class="step-list-modal" id="modalStepList"></div>

            <div id="modalMap"></div>

            <div class="modal-buttons">
                <button class="btn-close" onclick="closeAddModal()">Annulla</button>
                <button class="btn-save" onclick="saveNewRoute()">Salva Percorso</button>
            </div>
        </div>
    </div>
</div>

<div class="toast-alert" id="toast">📍 Aggiornato!</div>

<div class="immersive-bar" id="immersiveBar">
    <span id="immersiveProgress">1/10</span>
    <span class="immersive-step-name" id="immersiveStepName">Via Esempio</span>
    <div class="immersive-nav">
        <button onclick="prevStep()">◀</button>
        <button onclick="revealCurrentStep()">👁️</button>
        <button onclick="nextStep()">▶</button>
    </div>
</div>
<button class="immersive-exit" onclick="toggleImmersive()">✕</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylinedecorator.js"></script>
<script>
    (function() {
        const defaultRoutes = [{
            title: "DUOMO - LINATE",
            steps: ["P.ZA DUOMO","VIA MENGONI","VIA SANTA MARGHERITA","VIA S.PROTASO","VIA PORRONE","VIA SAN PROSPERO","VIA DANTE","P.ZA CORDUSIO","VIA OREFICI","VIA MAZZINI","L.GO BORGES","VIA MAZZINI","P.ZA MISSORI","VIA ALBRICCI","VIA LARGA","VIA VERZIERE","L.GO AUGUSTO","C.SO DI PORTA VITTORIA","P.ZA 5 GIORNATE","C.SO 22 MARZO","P.ZA EMILIA","C.SO 22 MARZO","P.ZA GRANDI","C.SO 22 MARZO","V.LE CORSICA","L.GO RODARI","V.LE CORSICA","V.LE FORLANINI","SNODO TANGENZIALE","AEROPORTO LINATE"]
        }];

        let routesData = JSON.parse(localStorage.getItem('customRoutesList')) || defaultRoutes;
        let map, modalMap;
        let currentRoute = null, currentStepIndex = -1;
        let currentMarker = null;
        let completedPolyline = null;
        let completedDecorator = null;
        let remainingPolyline = null;
        let polylineCoords = [];
        let currentMode = 'studio';
        let customCoordinates = JSON.parse(localStorage.getItem('customRouteCoords')) || {};
        let modalMarkers = [];
        let currentModalSteps = []; // passi temporanei della modale

        // ===================== INIZIALIZZAZIONE MAPPA =====================
        window.initMap = function() {
            map = L.map('map', { zoomControl: false }).setView([45.4642, 9.1900], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            L.control.zoom({ position: 'topright' }).addTo(map);
            const resetBtn = L.DomUtil.create('a', 'custom-reset-btn', map.zoomControl.getContainer());
            resetBtn.innerHTML = '🎯';
            resetBtn.title = 'Riposiziona';
            L.DomEvent.on(resetBtn, 'click', (e) => { L.DomEvent.stopPropagation(e); recenterOnCurrentMarker(); });
        };

        function recenterOnCurrentMarker() {
            if (currentMarker) {
                map.flyTo(currentMarker.getLatLng(), 16, { animate: true });
                currentMarker.openPopup();
            }
        }

        // ===================== MODALE NUOVA INTERFACCIA =====================
        window.openAddModal = function() {
            document.getElementById('routeModal').classList.add('open');
            currentModalSteps = [];
            renderModalStepList();
            clearModalMarkers();
            document.getElementById('newRouteTitle').value = '';
            document.getElementById('stepInput').value = '';
            if (!modalMap) {
                modalMap = L.map('modalMap', { zoomControl: false }).setView([45.4642, 9.1900], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(modalMap);
            } else {
                setTimeout(() => modalMap.invalidateSize(), 200);
            }
        };

        window.closeAddModal = function() {
            document.getElementById('routeModal').classList.remove('open');
            clearModalMarkers();
        };

        function clearModalMarkers() { modalMarkers.forEach(m => modalMap.removeLayer(m)); modalMarkers = []; }

        // Aggiunge una via alla lista corrente e posiziona il marker
        window.addStepFromInput = function() {
            const input = document.getElementById('stepInput');
            const via = input.value.trim().toUpperCase();
            if (!via) return;
            addStepToModal(via);
            input.value = '';
        };

        window.handleStepKeydown = function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                addStepFromInput();
            }
        };

        function addStepToModal(via) {
            currentModalSteps.push(via);
            renderModalStepList();
            // Posiziona il marker per questa via
            const idx = currentModalSteps.length - 1;
            const title = document.getElementById('newRouteTitle').value.trim().toUpperCase() || "TEMP";
            const cacheKey = `${title}_${idx}`;
            if (customCoordinates[cacheKey]) {
                createModalMarker(customCoordinates[cacheKey].lat, customCoordinates[cacheKey].lon, via, idx, title);
            } else {
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(via+', Milano')}`, {
                    headers: { 'User-Agent': 'ProntuarioNCC/2.0' }
                }).then(r => r.json()).then(data => {
                    if (data && data.length > 0) {
                        createModalMarker(parseFloat(data[0].lat), parseFloat(data[0].lon), via, idx, title);
                    }
                });
            }
        }

        function removeStepFromModal(index) {
            currentModalSteps.splice(index, 1);
            renderModalStepList();
            // Ricostruisci tutti i marker (più semplice)
            clearModalMarkers();
            const title = document.getElementById('newRouteTitle').value.trim().toUpperCase() || "TEMP";
            currentModalSteps.forEach((step, idx) => {
                const cacheKey = `${title}_${idx}`;
                if (customCoordinates[cacheKey]) {
                    createModalMarker(customCoordinates[cacheKey].lat, customCoordinates[cacheKey].lon, step, idx, title);
                } else {
                    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(step+', Milano')}`, {
                        headers: { 'User-Agent': 'ProntuarioNCC/2.0' }
                    }).then(r => r.json()).then(data => {
                        if (data && data.length > 0) createModalMarker(parseFloat(data[0].lat), parseFloat(data[0].lon), step, idx, title);
                    });
                }
            });
        }

        function renderModalStepList() {
            const container = document.getElementById('modalStepList');
            container.innerHTML = '';
            currentModalSteps.forEach((step, idx) => {
                const div = document.createElement('div');
                div.className = 'step-item-modal';
                div.innerHTML = `<span>${idx+1}. ${step}</span>
                    <button onclick="removeStepFromModal(${idx})" title="Rimuovi">✕</button>`;
                container.appendChild(div);
            });
        }

        function createModalMarker(lat, lon, step, idx, title) {
            const m = L.marker([lat, lon], { draggable: true }).addTo(modalMap)
                .bindPopup(`<b>${step}</b><br>
                    <a href="https://www.google.com/maps?layer=c&cbll=${lat},${lon}" target="_blank" 
                       style="color:#2563eb; font-weight:bold;">📸 Street View</a>`)
                .bindTooltip(`${idx+1}. ${step}`, { permanent: true, direction: 'top' });
            
            m.on('dragend', () => {
                const p = m.getLatLng();
                const currentTitle = document.getElementById('newRouteTitle').value.trim().toUpperCase() || "TEMP";
                customCoordinates[`${currentTitle}_${idx}`] = { lat: p.lat, lon: p.lng };
                localStorage.setItem('customRouteCoords', JSON.stringify(customCoordinates));
                m.setPopupContent(`<b>${step}</b><br>
                    <a href="https://www.google.com/maps?layer=c&cbll=${p.lat},${p.lng}" target="_blank" 
                       style="color:#2563eb; font-weight:bold;">📸 Street View</a>`);
            });

            modalMarkers.push(m);
            if (idx === 0) modalMap.setView([lat, lon], 13);
        }

        window.saveNewRoute = function() {
            const title = document.getElementById('newRouteTitle').value.trim().toUpperCase();
            if (!title) return alert("Inserisci un titolo.");
            if (currentModalSteps.length === 0) return alert("Aggiungi almeno una via.");

            // Trasferisci coordinate da "TEMP" al titolo definitivo
            for (let i = 0; i < currentModalSteps.length; i++) {
                const oldKey = `TEMP_${i}`;
                const newKey = `${title}_${i}`;
                if (customCoordinates[oldKey] && !customCoordinates[newKey]) {
                    customCoordinates[newKey] = customCoordinates[oldKey];
                    delete customCoordinates[oldKey];
                }
            }
            localStorage.setItem('customRouteCoords', JSON.stringify(customCoordinates));

            routesData.push({ title, steps: currentModalSteps });
            localStorage.setItem('customRoutesList', JSON.stringify(routesData));
            showToast("Percorso salvato!");
            closeAddModal();
            currentModalSteps = [];
        };

        // ===================== RESET =====================
        window.resetAllCoordinates = function() {
            if (confirm("Cancellare solo le correzioni di posizione personalizzate?")) {
                localStorage.removeItem('customRouteCoords');
                location.reload();
            }
        };

        // ===================== SELEZIONE PERCORSO =====================
        window.selectRandomRoute = () => { if (routesData.length) selectRoute(routesData[Math.floor(Math.random()*routesData.length)]); };

        window.setMode = function(mode) {
            currentMode = mode;
            document.getElementById('modeStudio').className = `mode-btn ${mode==='studio'?'active':''}`;
            document.getElementById('modeEsame').className = `mode-btn ${mode==='esame'?'active':''}`;
            document.getElementById('btnReveal').style.display = mode==='esame'?'block':'none';
            if (currentRoute) renderStepsList();
            updateImmersiveBar();
        };

        window.showSuggestions = function() {
            const input = document.getElementById('searchBar').value.toUpperCase();
            const list = document.getElementById('suggestions');
            list.innerHTML = '';
            if (!input) { list.style.display = 'none'; return; }
            const filtered = routesData.filter(r => r.title.includes(input));
            if (filtered.length) {
                filtered.forEach(r => {
                    const li = document.createElement('li'); li.textContent = r.title;
                    li.onclick = () => selectRoute(r);
                    list.appendChild(li);
                });
                list.style.display = 'block';
            } else list.style.display = 'none';
        };

        function selectRoute(route) {
            currentRoute = route; currentStepIndex = 0;
            document.getElementById('searchBar').value = route.title;
            document.getElementById('suggestions').style.display = 'none';
            document.getElementById('currentRouteTitle').textContent = route.title;
            if (currentMarker) map.removeLayer(currentMarker);
            clearPolylines();
            polylineCoords = [];
            renderStepsList();
            updateInterface();
            goToCurrentStepLocation();
        }

        function renderStepsList() {
            const container = document.getElementById('stepsList');
            container.innerHTML = '';
            currentRoute.steps.forEach((step, i) => {
                const div = document.createElement('div');
                let cls = '';
                if (i === currentStepIndex) cls = 'active';
                else if (i < currentStepIndex) cls = 'completed';
                div.className = `step-row ${currentMode==='esame'?'hidden-mode':''} ${cls}`;
                div.id = `step-${i}`;
                div.innerHTML = `<div class="step-number">${i+1}</div><div class="step-name">${step}</div>`;
                container.appendChild(div);
            });
        }

        // ===================== NAVIGAZIONE PASSI =====================
        window.nextStep = function() {
            if (currentStepIndex < currentRoute.steps.length-1) {
                document.getElementById(`step-${currentStepIndex}`).className = `step-row ${currentMode==='esame'?'hidden-mode':''} completed`;
                currentStepIndex++;
                document.getElementById(`step-${currentStepIndex}`).className = `step-row ${currentMode==='esame'?'hidden-mode':''} active`;
                document.getElementById(`step-${currentStepIndex}`).scrollIntoView({ behavior:'smooth', block:'nearest' });
                updateInterface();
                goToCurrentStepLocation();
                if (currentMode==='esame') navigator.vibrate?.(50);
            }
        };
        window.prevStep = function() {
            if (currentStepIndex > 0) {
                document.getElementById(`step-${currentStepIndex}`).className = `step-row ${currentMode==='esame'?'hidden-mode':''}`;
                currentStepIndex--;
                document.getElementById(`step-${currentStepIndex}`).className = `step-row ${currentMode==='esame'?'hidden-mode':''} active`;
                document.getElementById(`step-${currentStepIndex}`).scrollIntoView({ behavior:'smooth', block:'nearest' });
                updateInterface();
                goToCurrentStepLocation(true);
                if (currentMode==='esame') navigator.vibrate?.(50);
            }
        };
        window.revealCurrentStep = function() {
            if (currentRoute) {
                document.getElementById(`step-${currentStepIndex}`).classList.add('revealed');
                updateImmersiveBar();
            }
        };

        function updateInterface() {
            document.getElementById('routeProgress').textContent = `Tappa ${currentStepIndex+1} di ${currentRoute.steps.length}`;
            document.getElementById('btnPrev').disabled = currentStepIndex === 0;
            document.getElementById('btnNext').disabled = currentStepIndex === currentRoute.steps.length-1;
            document.getElementById('btnStreet').disabled = !currentMarker;
            updateImmersiveBar();
        }

        function updateImmersiveBar() {
            if (!currentRoute) return;
            document.getElementById('immersiveProgress').textContent = `${currentStepIndex+1}/${currentRoute.steps.length}`;
            document.getElementById('immersiveStepName').textContent = currentRoute.steps[currentStepIndex];
            const revealed = document.getElementById(`step-${currentStepIndex}`)?.classList.contains('revealed');
            document.getElementById('immersiveStepName').className = 'immersive-step-name' + (currentMode==='studio' || revealed ? ' revealed' : '');
        }

        window.openRealStreetView = function() {
            if (currentMarker) {
                const p = currentMarker.getLatLng();
                window.open(`https://www.google.com/maps?layer=c&cbll=${p.lat},${p.lng}`, '_blank');
            }
        };

        // ===================== POSIZIONAMENTO MARKER (LINEA RETTA PROGRESSIVA) =====================
        function goToCurrentStepLocation(isGoingBack = false) {
            const stepName = currentRoute.steps[currentStepIndex];
            const cacheKey = `${currentRoute.title}_${currentStepIndex}`;
            if (customCoordinates[cacheKey]) {
                placeMarker(customCoordinates[cacheKey].lat, customCoordinates[cacheKey].lon, stepName, cacheKey, isGoingBack);
                return;
            }
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(stepName+', Milano')}`, {
                headers: { 'User-Agent': 'ProntuarioNCC/2.0' }
            }).then(r => r.json()).then(data => {
                if (data && data.length > 0) placeMarker(parseFloat(data[0].lat), parseFloat(data[0].lon), stepName, cacheKey, isGoingBack);
            });
        }

        function clearPolylines() {
            if (completedDecorator) {
                map.removeLayer(completedDecorator);
                completedDecorator = null;
            }
            if (completedPolyline) {
                map.removeLayer(completedPolyline);
                completedPolyline = null;
            }
            if (remainingPolyline) {
                map.removeLayer(remainingPolyline);
                remainingPolyline = null;
            }
        }

        function drawProgressivePath() {
            clearPolylines();
            if (polylineCoords.length < 2) return;

            const doneCoords = polylineCoords.slice(0, currentStepIndex + 1);
            if (doneCoords.length >= 2) {
                completedPolyline = L.polyline(doneCoords, {
                    color: '#3b82f6', weight: 6, opacity: 0.95, smoothFactor: 1
                }).addTo(map);

                completedDecorator = L.polylineDecorator(completedPolyline, {
                    patterns: [{
                        offset: '5%',
                        repeat: '100px',
                        symbol: L.Symbol.arrowHead({
                            pixelSize: 16,
                            pathOptions: { color: '#1e40af', weight: 3 }
                        })
                    }]
                }).addTo(map);
            }

            if (polylineCoords.length > currentStepIndex + 1) {
                const remaining = polylineCoords.slice(currentStepIndex);
                remainingPolyline = L.polyline(remaining, {
                    color: '#94a3b8', weight: 3, opacity: 0.4, dashArray: '8 8', smoothFactor: 1
                }).addTo(map);
            }
        }

        function placeMarker(lat, lon, name, cacheKey, isGoingBack) {
            map.flyTo([lat, lon], 16, { animate: true, duration: 0.4 });
            const pt = L.latLng(lat, lon);

            if (!isGoingBack) {
                polylineCoords[currentStepIndex] = pt;
            } else {
                polylineCoords.splice(currentStepIndex + 1);
            }
            drawProgressivePath();

            if (currentMarker) {
                currentMarker.setLatLng(pt);
                currentMarker.getPopup().setContent(`<b>${name}</b><br>Trascina per regolare`);
            } else {
                currentMarker = L.marker(pt, { draggable: true }).addTo(map)
                    .bindPopup(`<b>${name}</b><br>Trascina per regolare`);
            }
            currentMarker.openPopup();
            updateInterface();

            currentMarker.off('dragend');
            currentMarker.on('dragend', function() {
                const pos = currentMarker.getLatLng();
                customCoordinates[cacheKey] = { lat: pos.lat, lon: pos.lng };
                localStorage.setItem('customRouteCoords', JSON.stringify(customCoordinates));
                polylineCoords[currentStepIndex] = pos;
                drawProgressivePath();
                showToast("📍 Posizione aggiornata!");
            });
        }

        // ===================== MODALITÀ IMMERSIVA =====================
        window.toggleImmersive = function() {
            document.body.classList.toggle('immersive');
            setTimeout(() => map.invalidateSize(), 150);
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        // ===================== AVVIO =====================
        window.onload = function() {
            initMap();
            // Le funzioni per la modale sono già esposte globalmente
        };
    })();
</script>
</body>
</html>
