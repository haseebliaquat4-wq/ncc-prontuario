
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>NCC Pilot — Mappa Percorsi</title>
<meta name="theme-color" content="#0b1020">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="assets/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

  <header class="topbar">
    <div class="brand">
      <span class="brand-icon">🧭</span>
      <span class="brand-name">NCC Pilot</span>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchBar" placeholder="Cerca un percorso…" autocomplete="off">
      <ul class="suggestions" id="suggestionsList"></ul>
    </div>

    <div class="mode-switch" id="modeSwitch">
      <span class="mode-indicator" id="modeIndicator"></span>
      <button class="mode-btn active" data-mode="studio">Studio</button>
      <button class="mode-btn" data-mode="esame">Esame</button>
      <button class="mode-btn" data-mode="quiz">Quiz</button>
    </div>

    <div class="actions">
      <button class="icon-btn" id="menuToggle" aria-label="Menu">⋮</button>
      <div class="menu-dropdown" id="menuDropdown">
        <button data-action="add">➕ <span>Nuovo percorso</span></button>
        <button data-action="random">🔀 <span>Percorso casuale</span></button>
        <button data-action="manage">📋 <span>Gestisci percorsi</span></button>
        <button data-action="cloud">☁️ <span>Salva su cloud</span></button>
        <button data-action="export">📤 <span>Esporta dati</span></button>
        <button data-action="import">📥 <span>Importa dati</span></button>
        <div class="menu-sep"></div>
        <button data-action="reset" class="danger">🗑️ <span>Reset dati</span></button>
      </div>
    </div>
  </header>

  <main class="main">
    <div id="map"></div>

    <section class="panel" id="panel">
      <div class="panel-grip" id="panelGrip">
        <span class="grip-bar"></span>
        <div class="panel-header">
          <h1 id="currentRouteTitle">Seleziona un percorso</h1>
          <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
          <p id="routeProgress">Nessun percorso attivo</p>
        </div>
      </div>

      <div class="steps-container" id="stepsList"></div>

      <div class="panel-footer">
        <div id="normalFooter">
          <button class="btn btn-ghost reveal-btn" id="btnReveal" style="display:none;">👁️ Scopri via</button>
          <div class="btn-row">
            <button class="btn btn-circle" id="btnPrev" disabled aria-label="Via precedente">‹</button>
            <button class="btn btn-pill btn-amber" id="btnStreet" disabled>👁️ Street View</button>
            <button class="btn btn-circle btn-primary" id="btnNext" disabled aria-label="Via successiva">›</button>
          </div>
        </div>

        <div id="quizFooter" style="display:none;">
          <div class="quiz-input-row">
            <input id="quizAnswer" placeholder="Scrivi il nome della via…" autocomplete="off">
            <button class="btn btn-circle btn-primary" id="btnQuizCheck" aria-label="Verifica">➜</button>
          </div>
          <div class="quiz-feedback" id="quizFeedback"></div>
          <div class="btn-row">
            <button class="btn btn-secondary" id="btnQuizSkip">⏭️ Salta</button>
            <button class="btn btn-secondary" id="btnQuizReveal">👁️ Mostra</button>
          </div>
 NCC, [Jun 16, 2026 at 16:59]
</div>
      </div>
    </section>
  </main>
</div>

<!-- Modale: nuovo / modifica percorso -->
<div class="modal" id="routeModal">
  <div class="modal-box">
    <h3 id="modalTitle">➕ Nuovo percorso</h3>
    <input type="text" id="newRouteTitle" placeholder="TITOLO (es. LINATE - OSPEDALE)">
    <textarea id="newRouteSteps" placeholder="Incolla l'elenco delle vie (una per riga)"></textarea>
    <div class="modal-buttons">
      <button class="btn-close" id="btnCancelRoute">Annulla</button>
      <button class="btn-save" id="btnSaveRoute">Salva</button>
    </div>
  </div>
</div>

<!-- Modale: gestione percorsi -->
<div class="modal" id="routesManagerModal">
  <div class="modal-box">
    <h3>📋 Percorsi salvati</h3>
    <div class="routes-manager-list" id="routesManagerList"></div>
    <div class="modal-buttons">
      <button class="btn-close" id="btnCloseManager">Chiudi</button>
    </div>
  </div>
</div>

<!-- Modale: conferma generica -->
<div class="modal" id="confirmModal">
  <div class="modal-box modal-box-sm">
    <h3>⚠️ Conferma</h3>
    <p id="confirmMessage">Sei sicuro?</p>
    <div class="modal-buttons">
      <button class="btn-close" id="confirmNo">Annulla</button>
      <button class="btn-save btn-danger" id="confirmYes">Conferma</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylinedecorator.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="js/app.js"></script>
</body>
</html>
